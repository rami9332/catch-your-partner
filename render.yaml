services:
  - type: web
    name: catch-your-partner-api-rami9332
    runtime: docker
    rootDir: beta_backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: catch-your-partner-db-rami9332
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: SMS_PROVIDER
        value: none

  - type: static_site
    name: catch-your-partner-web-rami9332
    rootDir: .
    buildCommand: ./scripts/render/build-frontend.sh
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: PUBLIC_BACKEND_ORIGIN
        value: https://catch-your-partner-api-rami9332.onrender.com

databases:
  - name: catch-your-partner-db-rami9332
    plan: free
