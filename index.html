    function verificationStatus() {
      if (profileState.resultState === "ready") return "ready";
      if (profileState.scanState === "processing" || profileState.scanState === "requesting") return "processing";
      return "not_ready";
    }

    function matchingReasons(profile) {
      const reasons = [];
      if (!profile.faceScanAvailable) reasons.push("app.profile.matching.reason.scan");
      if (!["ready", "verified"].includes(profile.verificationStatus)) reasons.push("app.profile.matching.reason.verification");
      if (!profile.radarActive) reasons.push("app.profile.matching.reason.radar");
      if (!profile.locationAvailable) reasons.push("app.profile.matching.reason.location");
      if (!profile.matchingAllowed) reasons.push("app.profile.matching.reason.allowed");
      if (!reasons.length) reasons.push("app.profile.matching.reason.ready");
      return reasons;
    }

    function buildMatchingProfile() {
      const now = new Date().toISOString();
      const verification = verificationStatus();
      const currentLocation = locationSnapshot();
      const profile = {
        userId: matchingState.userId,
        verificationStatus: verification,
        faceScanAvailable: profileState.resultState === "ready" && Boolean(profileState.captureDataUrl),
        locationAvailable: Boolean(currentLocation),
        radarActive,
        matchingAllowed: true,
        matchingEligible: false,
        interests: [],
        preferences: {
          maxDistanceMeters: MATCHING_RADIUS_METERS
        },
        timestamps: {
          updatedAt: now,
          lastSeenAt: currentLocation?.updatedAt ?? null,
          lastRadarActivationAt: lastRadarActivationAt,
          lastFaceScanAt: profileState.lastScanAt
        },
        scan: {
          detectorMode: profileState.detectorMode,
          faceCount: profileState.lastFaceCount,
          available: profileState.resultState === "ready",
          captureAvailable: Boolean(profileState.captureDataUrl)
        },
        location: currentLocation,
        radar: {
          active: radarActive,
          lastActivationAt: lastRadarActivationAt
        }
      };

      profile.matchingEligible = Boolean(
        profile.faceScanAvailable
        && ["ready", "verified"].includes(profile.verificationStatus)
        && profile.radarActive
        && profile.locationAvailable
        && profile.matchingAllowed
      );
      profile.reasons = matchingReasons(profile);

      return profile;
    }

    function persistMatchingProfile() {
      matchingState.profile = buildMatchingProfile();
      try {
        localStorage.setItem(MATCHING_STORAGE_KEY, JSON.stringify(matchingState.profile));
      } catch (error) {
        // Local persistence is best effort only.
      }
    }

    function isWithinMatchingRadius(source, candidate) {
      if (!source?.location || !candidate?.location) return false;
      const radius = Math.min(
        source.preferences?.maxDistanceMeters ?? MATCHING_RADIUS_METERS,
        candidate.preferences?.maxDistanceMeters ?? MATCHING_RADIUS_METERS
      );
      return distanceBetween(source.location, candidate.location) <= radius;
    }

    function canUsersMatch(source, candidate) {
      if (!source || !candidate) return false;
      if (!source.matchingEligible || !candidate.matchingEligible) return false;
      return isWithinMatchingRadius(source, candidate);
    }

    function serializeMatchingProfile(profile = buildMatchingProfile()) {
      return {
        verification_status: profile.verificationStatus,
        face_scan_available: profile.faceScanAvailable,
        location_available: profile.locationAvailable,
        radar_active: profile.radarActive,
        matching_allowed: profile.matchingAllowed,
        interests: profile.interests || [],
        preferences: profile.preferences || {},
        location: profile.location
          ? {
              lat: profile.location.lat,
              lng: profile.location.lng,
              updated_at: profile.location.updatedAt
            }
          : null,
        timestamps: {
          updated_at: profile.timestamps?.updatedAt ?? null,
          last_seen_at: profile.timestamps?.lastSeenAt ?? null,
          last_radar_activation_at: profile.timestamps?.lastRadarActivationAt ?? null,
          last_face_scan_at: profile.timestamps?.lastFaceScanAt ?? null
        },
        scan: {
          detector_mode: profile.scan?.detectorMode ?? null,
          face_count: profile.scan?.faceCount ?? 0,
          capture_available: profile.scan?.captureAvailable ?? false
        }
      };
    }

    async function syncMatchingProfile(baseUrl, token) {
      const payload = serializeMatchingProfile();
      const response = await fetch(`${baseUrl.replace(/\/$/, "")}/core/matching/profile`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          ...(token ? { Authorization: `Bearer ${token}` } : {})
        },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        throw new Error(`matching-sync-failed:${response.status}`);
      }

      return response.json();
    }

    function getBackendOrigin() {
      const injectedBackend = typeof window.__CYP_BACKEND__ === "string" ? window.__CYP_BACKEND__ : "";
      if (injectedBackend) return injectedBackend.replace(/\/$/, "");
      const runtimeBackend =
        typeof window.__CYP_RUNTIME_CONFIG__?.backendOrigin === "string"
          ? window.__CYP_RUNTIME_CONFIG__.backendOrigin
          : "";
      if (runtimeBackend) return runtimeBackend.replace(/\/$/, "");
      try {
        const storedBackend = localStorage.getItem("catchyourpartner.backendOrigin");
        if (storedBackend) return storedBackend.replace(/\/$/, "");
      } catch (error) {
        // Local storage fallback is best effort only.
      }
      const explicitBackend = params.get("backend");
      if (explicitBackend) return explicitBackend.replace(/\/$/, "");
      if (!window.location.hostname) return "";
      return `${window.location.protocol}//${window.location.hostname}:8000`;
    }

    function liveMatchingEnabled(profile = matchingState.profile ?? buildMatchingProfile()) {
      return Boolean(authState.token && matchingReadyForCandidates(profile));
    }

    function matchingReadyForCandidates(profile = matchingState.profile ?? buildMatchingProfile()) {
      return Boolean(profile?.matchingEligible);
    }

    function stopMatchingLiveRefresh() {
      if (authState.livePollTimer) {
        clearTimeout(authState.livePollTimer);
        authState.livePollTimer = null;
      }
      authState.livePolling = false;
    }

    function scheduleNextMatchingPoll(delay = 15000) {
      if (!liveMatchingEnabled()) return;
      if (authState.livePollTimer) {
        clearTimeout(authState.livePollTimer);
      }
      authState.livePollTimer = window.setTimeout(async () => {
        authState.livePollTimer = null;
        if (!liveMatchingEnabled()) {
          stopMatchingLiveRefresh();
          updateProfileUI();
          return;
        }
        await loadMatchingCandidates();
        if (liveMatchingEnabled()) {
          scheduleNextMatchingPoll();
        }
      }, delay);
    }

    function reconcileMatchingLiveRefresh() {
      if (liveMatchingEnabled()) {
        authState.livePolling = true;
        ensureNotificationPermission();
        if (!authState.livePollTimer) {
          scheduleNextMatchingPoll();
        }
      } else {
        stopMatchingLiveRefresh();
      }
    }

    function formatLiveRefreshLabel() {
      if (authState.matchingCandidatesState === "error") return t("app.profile.matching.live.error");
      if (!authState.livePolling || !authState.lastCandidatesFetchedAt) return t("app.profile.matching.live.idle");

      const diffMs = Math.max(0, Date.now() - new Date(authState.lastCandidatesFetchedAt).getTime());
      const minutes = Math.floor(diffMs / 60000);
      if (minutes < 1) return t("app.profile.matching.live.now");
      return tFormat("app.profile.matching.live.minutes", { count: minutes });
    }

    function notificationStatusKey() {
      if (!("Notification" in window)) return "app.profile.matching.notifications.unsupported";
      if (Notification.permission === "granted") return "app.profile.matching.notifications.allowed";
      if (Notification.permission === "denied") return "app.profile.matching.notifications.blocked";
      return "app.profile.matching.notifications.default";
    }

    async function ensureNotificationPermission() {
      if (!liveMatchingEnabled() || !("Notification" in window)) return;
      if (Notification.permission !== "default" || authState.notificationsRequested) return;
      authState.notificationsRequested = true;
      try {
        await Notification.requestPermission();
      } catch (error) {
        // Permission request is best effort only.
      }
      updateProfileUI();
    }

    function resetMatchingCandidateState() {
      authState.candidateCount = 0;
      authState.lastCandidatesFetchedAt = "";
      authState.lastCandidateIds = [];
    }

    async function prepareMeetingPointFromCandidate() {
      if (!meetingState.activeCandidate) return;

      if (authState.token) {
        try {
          const existingMeeting = await loadSharedMeetingForCandidate();
          if (existingMeeting) {
            applyServerMeeting(existingMeeting);
            updateMeetingMap();
            updateMeetingUI();
            return;
          }
        } catch (error) {
          meetingState.preparationNoteKey = "app.meeting.flow.idle.candidate_body_meeting_failed";
        }
      }

      const localLocation = currentUserMeetingLocation();
      const candidateLocation = meetingState.activeCandidate.location;

      if (!localLocation) {
        meetingState.preparationNoteKey = "app.meeting.flow.idle.candidate_body_local_missing";
        meetingState.preparationPending = false;
        if (!meetingState.meetingPoint) meetingFlowState = "idle";
        updateMeetingUI();
        return;
      }

      if (!candidateLocation || candidateLocation.lat == null || candidateLocation.lng == null) {
        meetingState.preparationNoteKey = "app.meeting.flow.idle.candidate_body_remote_missing";
        meetingState.preparationPending = false;
        if (!meetingState.meetingPoint) meetingFlowState = "idle";
        updateMeetingUI();
        return;
      }

      if (meetingState.preparationPending) return;

      meetingState.preparationPending = true;
      meetingState.errorKey = "";
      meetingFlowState = "loading";
      updateMeetingUI();

      try {
        const nativeResult = window.CYPNative?.openMeetingMap
          ? await openNativeMeetingMap({ candidateLocation })
          : null;
        const meetingPoint = nativeResult?.meetingPoint && Number.isFinite(nativeResult.meetingPoint.lat) && Number.isFinite(nativeResult.meetingPoint.lng)
          ? {
              name: nativeResult.meetingPoint.name || "Treffpunkt",
              lat: nativeResult.meetingPoint.lat,
              lng: nativeResult.meetingPoint.lng
            }
          : await (async () => {
              const midpoint = midpointBetween(localLocation, candidateLocation);
              return findNeutralMeetingPoint(midpoint.lat, midpoint.lng);
            })();
        const serverMeeting = await createSharedMeetingForCandidate(meetingPoint);
        if (!serverMeeting) {
          throw new Error("meeting-create-failed");
        }
        meetingState.currentPosition = {
          lat: localLocation.lat,
          lng: localLocation.lng
        };
        meetingState.lastLocationAt = localLocation.updatedAt ?? new Date().toISOString();
        applyServerMeeting(serverMeeting);
        if (nativeResult?.routeMeta) {
          applyNativeMeetingMapResult(nativeResult);
          meetingState.serverMeeting = serverMeeting;
        }
        updateMeetingMap();
      } catch (error) {
        meetingState.serverMeeting = null;
        meetingState.meetingPoint = null;
        meetingState.route = null;
        meetingState.routeError = false;
        meetingState.routingStatus = "idle";
        meetingFlowState = "idle";
        meetingState.preparationNoteKey = error?.message === "app.meeting.errors.point_unavailable"
          ? "app.meeting.flow.idle.candidate_body_point_missing"
          : /^meeting-(create|load)-failed/.test(error?.message || "")
            ? "app.meeting.flow.idle.candidate_body_meeting_failed"
            : "app.meeting.flow.idle.candidate_body_route_error";
      } finally {
        meetingState.preparationPending = false;
        updateMeetingUI();
      }
    }

    function syncMeetingCandidate(candidates = []) {
      const nextCandidate = Array.isArray(candidates) && candidates.length ? candidates[0] : null;
      const currentId = meetingState.activeCandidate?.user_id || "";
      const nextId = nextCandidate?.user_id || "";

      if (!nextCandidate) {
        meetingState.activeCandidate = null;
        meetingState.serverMeeting = null;
        meetingState.preparationNoteKey = "";
        meetingState.preparationPending = false;
        meetingState.chatOpen = false;
        meetingState.chatLoading = false;
        meetingState.chatMessages = [];
        meetingState.chatError = "";
        meetingState.lastChatSyncAt = "";
        stopChatLiveRefresh();
        meetingState.meetingPoint = null;
        meetingState.route = null;
        meetingState.routeError = false;
        meetingState.routingStatus = "idle";
        stopMeetingWatch();
        meetingFlowState = "idle";
        updateMeetingUI();
        return;
      }

      if (currentId === nextId) {
        meetingState.activeCandidate = nextCandidate;
        if (!meetingState.meetingPoint) {
          prepareMeetingPointFromCandidate();
        }
        updateMeetingUI();
        return;
      }

      meetingState.activeCandidate = nextCandidate;
      meetingState.preparationNoteKey = "";
      if (!meetingState.meetingPoint && (meetingFlowState === "idle" || meetingFlowState === "error")) {
        meetingFlowState = "idle";
      }
      prepareMeetingPointFromCandidate();
      updateMeetingUI();
    }

    function notifyAboutNewCandidates(newCandidates) {
      if (!liveMatchingEnabled() || !authState.livePolling) return;
      if (!("Notification" in window) || Notification.permission !== "granted") return;
      if (!Array.isArray(newCandidates) || !newCandidates.length) return;

      const titleKey = newCandidates.length === 1
        ? "app.profile.matching.notifications.title.single"
        : "app.profile.matching.notifications.title.multi";
      const bodyKey = newCandidates.length === 1
        ? "app.profile.matching.notifications.body.single"
        : "app.profile.matching.notifications.body.multi";

      const body = newCandidates.length === 1
        ? tFormat(bodyKey, { name: newCandidates[0].name || "Eine Person" })
        : tFormat(bodyKey, { count: newCandidates.length });

      try {
        new Notification(t(titleKey), {
          body,
          tag: `matching-candidates-${newCandidates.map((candidate) => candidate.user_id).sort().join("-")}`
        });
      } catch (error) {
        // Notifications stay optional on the client.
      }
    }

    function setAuthNote(key) {
      authState.noteKey = key;
      const noteEl = document.getElementById("authStatusNote");
      if (noteEl) noteEl.textContent = t(key);
    }

    function persistAuthSession() {
      try {
        if (!authState.token || !authState.user) {
          localStorage.removeItem(AUTH_STORAGE_KEY);
          return;
        }
        localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify({
          token: authState.token,
          user: authState.user
        }));
      } catch (error) {
        // Session persistence is best effort only.
      }
    }

    function setAuthSession(token, user) {
      authState.token = token;
      authState.user = user;
      syncPhoneUiStateFromUser();
      persistAuthSession();
      setAuthNote("auth.status.ready");
      loadSafetyCircleContacts();
    }

    function readAuthInput(name) {
      const element = document.getElementById(`auth-${authMode}-${name}`);
      return typeof element?.value === "string" ? element.value.trim() : "";
    }

    async function submitAuth() {
      if (authState.busy) return;

      const backendOrigin = getBackendOrigin();
      if (!backendOrigin) {
        setAuthNote("auth.status.offline");
        return;
      }

      const endpoint = authMode === "register" ? "/auth/register" : "/auth/login";
      const payload = authMode === "register"
        ? {
            name: readAuthInput("name"),
            email: readAuthInput("email"),
            password: readAuthInput("password"),
            mode: readAuthInput("plan") === "premium" ? "premium" : "free",
            interests: []
          }
        : {
            email: readAuthInput("email"),
            password: readAuthInput("password")
          };

      authState.busy = true;
      try {
        const response = await fetch(`${backendOrigin}${endpoint}`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const offline = response.status >= 500;
          throw new Error(offline ? "offline" : "auth");
        }

        const data = await response.json();
        setAuthSession(data.access_token || "", data.user || null);
        activateScreen("app");
        scheduleMatchingSync("auth");
      } catch (error) {
        const offline = error?.message === "offline" || error instanceof TypeError;
        setAuthNote(offline ? "auth.status.offline" : "auth.status.error");
      } finally {
        authState.busy = false;
      }
    }

    async function loadMatchingCandidates() {
      const backendOrigin = getBackendOrigin();
      if (!backendOrigin || !authState.token) {
        stopMatchingLiveRefresh();
        authState.matchingCandidatesState = "blocked";
        resetMatchingCandidateState();
        return;
      }

      authState.matchingCandidatesState = "loading";
      authState.candidatesError = "";
      updateProfileUI();

      try {
        const response = await fetch(`${backendOrigin}/core/matching/candidates`, {
          headers: {
            Authorization: `Bearer ${authState.token}`
          }
        });

        if (!response.ok) {
          throw new Error(`matching-candidates-failed:${response.status}`);
        }

        const data = await response.json();
        const candidates = Array.isArray(data?.candidates) ? data.candidates : [];
        const previousIds = new Set(authState.lastCandidateIds);
        const nextIds = candidates.map((candidate) => candidate.user_id).filter(Boolean);
        const newCandidates = authState.lastCandidateIds.length
          ? candidates.filter((candidate) => candidate?.user_id && !previousIds.has(candidate.user_id))
          : [];
        authState.candidateCount = candidates.length;
        authState.matchingCandidatesState = candidates.length ? "ready" : "empty";
        authState.lastCandidatesFetchedAt = new Date().toISOString();
        authState.lastCandidateIds = nextIds;
        syncMeetingCandidate(candidates);
        notifyAboutNewCandidates(newCandidates);
      } catch (error) {
        resetMatchingCandidateState();
        authState.candidatesError = error.message;
        authState.matchingCandidatesState = "error";
        syncMeetingCandidate([]);
      }
      updateProfileUI();
    }

    async function performMatchingSync() {
      authState.syncTimer = null;
      persistMatchingProfile();

      const profile = matchingState.profile;
      if (!authState.token) {
        authState.matchingSyncState = "auth";
        authState.matchingCandidatesState = profile.matchingEligible ? "blocked" : "idle";
        resetMatchingCandidateState();
        stopMatchingLiveRefresh();
        syncMeetingCandidate([]);
        updateProfileUI();
        return;
      }

      const backendOrigin = getBackendOrigin();
      if (!backendOrigin) {
        authState.matchingSyncState = "offline";
        authState.matchingCandidatesState = "error";
        resetMatchingCandidateState();
        stopMatchingLiveRefresh();
        syncMeetingCandidate([]);
        updateProfileUI();
        return;
      }

      const payload = JSON.stringify(serializeMatchingProfile(profile));
      if (payload === authState.lastSyncedPayload && authState.matchingSyncState === "synced") {
        if (matchingReadyForCandidates(profile)) {
          loadMatchingCandidates();
          reconcileMatchingLiveRefresh();
        } else {
          authState.matchingCandidatesState = "blocked";
          resetMatchingCandidateState();
          stopMatchingLiveRefresh();
          syncMeetingCandidate([]);
          updateProfileUI();
        }
        return;
      }

      authState.matchingSyncState = "syncing";
      authState.syncError = "";
      updateProfileUI();

      try {
        await syncMatchingProfile(backendOrigin, authState.token);
        authState.lastSyncedPayload = payload;
        authState.matchingSyncState = "synced";
        if (matchingReadyForCandidates(profile)) {
          await loadMatchingCandidates();
          reconcileMatchingLiveRefresh();
        } else {
          authState.matchingCandidatesState = "blocked";
          resetMatchingCandidateState();
          stopMatchingLiveRefresh();
          syncMeetingCandidate([]);
        }
      } catch (error) {
        authState.syncError = error.message;
        authState.matchingSyncState = error instanceof TypeError || /:5\d\d$/.test(error.message) ? "offline" : "error";
        authState.matchingCandidatesState = "error";
        resetMatchingCandidateState();
        stopMatchingLiveRefresh();
        syncMeetingCandidate([]);
      }

      updateProfileUI();
    }

    function scheduleMatchingSync(reason = "") {
      persistMatchingProfile();
      if (authState.syncTimer) {
        clearTimeout(authState.syncTimer);
      }

      if (!authState.token) {
        authState.matchingSyncState = "auth";
        authState.matchingCandidatesState = matchingState.profile?.matchingEligible ? "blocked" : "idle";
        resetMatchingCandidateState();
        stopMatchingLiveRefresh();
        syncMeetingCandidate([]);
        updateProfileUI();
        return;
      }

      authState.syncTimer = window.setTimeout(() => {
        performMatchingSync();
      }, reason === "auth" ? 120 : 320);
    }

    async function restoreAuthSession() {
      try {
        const raw = localStorage.getItem(AUTH_STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (!parsed?.token) return;

        authState.token = parsed.token;
        authState.user = parsed.user || null;
        setAuthNote("auth.status.ready");

        const backendOrigin = getBackendOrigin();
        const response = await fetch(`${backendOrigin}/auth/me`, {
          headers: {
            Authorization: `Bearer ${authState.token}`
          }
        });

        if (!response.ok) throw new Error("auth-restore-failed");
        authState.user = await response.json();
        syncPhoneUiStateFromUser();
        persistAuthSession();
        loadSafetyCircleContacts();
        activateScreen("app");
        scheduleMatchingSync("auth");
      } catch (error) {
        stopMatchingLiveRefresh();
        clearSafetyAlarmCountdown();
        authState.token = "";
        authState.user = null;
        authState.safetyCircleContacts = [];
        authState.safetyCircleEditingId = "";
        authState.safetyCircleStatusKey = "app.profile.safety.circle.status.idle";
        authState.safetyCircleErrorKey = "";
        authState.safetyAlarmStatusKey = "app.profile.safety.alarm.idle";
        authState.safetyAlarmId = "";
        syncPhoneUiStateFromUser();
        authState.lastSyncedPayload = "";
        resetMatchingCandidateState();
        syncMeetingCandidate([]);
        setAuthNote("auth.note");
        persistAuthSession();
      }
    }

    function setMeetingError(errorKey) {
      meetingState.loading = false;
      meetingState.errorKey = errorKey;
      meetingState.routeError = true;
      meetingState.nativeRouteActive = false;
      if (errorKey === "app.meeting.errors.point_unavailable") {
        meetingState.meetingPoint = null;
        meetingState.route = null;
        meetingState.routingStatus = "idle";
      }
      meetingFlowState = "error";
      if (errorKey === "app.meeting.errors.geolocation_denied") meetingState.permission = "denied";
      if (errorKey === "app.meeting.errors.geolocation_timeout") meetingState.permission = "timeout";
      if (errorKey === "app.meeting.errors.geolocation_unavailable") meetingState.permission = "unavailable";
      if (errorKey === "app.meeting.errors.geolocation_insecure") meetingState.permission = "insecure";
      if (errorKey.startsWith("app.meeting.errors.geolocation")) {
        radarActive = false;
        renderRadarState();
      }
      updateMeetingUI();
    }

    function openNativeMeetingMap({ meetingPoint = null, candidateLocation = null, acceptance = null, arrival = null, ok = null, meetingContext = null } = {}) {
      return new Promise((resolve, reject) => {
        if (!window.CYPNative?.openMeetingMap) {
          reject(new Error("native-map-unavailable"));
          return;
        }

        const timeout = window.setTimeout(() => {
          window.removeEventListener("cyp:native-meeting-map", handleResult);
          reject(new Error("native-map-timeout"));
        }, 45000);

        function handleResult(event) {
          window.clearTimeout(timeout);
          window.removeEventListener("cyp:native-meeting-map", handleResult);
          resolve(event.detail);
        }

        window.addEventListener("cyp:native-meeting-map", handleResult, { once: true });
        const payload = {};
        if (meetingPoint) {
          payload.meetingPoint = {
            name: meetingPoint.name,
            latitude: meetingPoint.lat,
            longitude: meetingPoint.lng
          };
        }
        if (candidateLocation) {
          payload.candidateLocation = {
            latitude: candidateLocation.lat,
            longitude: candidateLocation.lng
          };
        }
        if (acceptance) {
          payload.acceptance = acceptance;
        }
        if (arrival) {
          payload.arrival = arrival;
        }
        if (ok) {
          payload.ok = ok;
        }
        if (meetingContext) {
          payload.meetingContext = meetingContext;
        }

        const started = window.CYPNative.openMeetingMap(payload);

        if (!started) {
          window.clearTimeout(timeout);
          window.removeEventListener("cyp:native-meeting-map", handleResult);
          reject(new Error("native-map-unavailable"));
        }
      });
    }

    function applyNativeMeetingMapResult(result) {
      if (result?.serverMeeting) {
        applyServerMeeting(result.serverMeeting);
      }
      const shouldOpenChat = Boolean(result?.openChat && result?.serverMeeting?.chat_unlocked);

      const nativePoint = result?.meetingPoint && Number.isFinite(result.meetingPoint.lat) && Number.isFinite(result.meetingPoint.lng)
        ? {
            name: result.meetingPoint.name || "Treffpunkt",
            lat: result.meetingPoint.lat,
            lng: result.meetingPoint.lng
          }
        : null;
      const nativeLocation = result?.location && Number.isFinite(result.location.lat) && Number.isFinite(result.location.lng)
        ? {
            lat: result.location.lat,
            lng: result.location.lng
          }
        : null;
      const nativeRouteMeta = result?.routeMeta
        && Number.isFinite(result.routeMeta.distanceMeters)
        && Number.isFinite(result.routeMeta.expectedTravelTimeSeconds)
        ? {
            distance: result.routeMeta.distanceMeters,
            duration: result.routeMeta.expectedTravelTimeSeconds,
            native: true
          }
        : null;

      meetingState.currentPosition = nativeLocation;
      meetingState.lastLocationAt = nativeLocation ? new Date().toISOString() : meetingState.lastLocationAt;
      meetingState.meetingPoint = nativePoint;
      meetingState.route = nativeRouteMeta;
      meetingState.nativeRouteActive = Boolean(nativePoint && nativeRouteMeta);
      meetingState.routeError = Boolean(result?.errorStatus);
      meetingState.errorKey = "";

      if (nativeLocation) {
        meetingState.permission = "granted";
      } else if (result?.errorStatus === "location_denied") {
        meetingState.permission = "denied";
      } else if (result?.errorStatus === "location_unavailable") {
        meetingState.permission = "unavailable";
      }

      if (nativePoint && nativeRouteMeta) {
        meetingState.routingStatus = "active";
        meetingFlowState = "navigating";
        updateMeetingMap();
        if (shouldOpenChat) queueMicrotask(() => { openMeetingChat(); });
        return;
      }

      if (nativePoint && (!result?.errorStatus || result?.errorStatus === "routing_unavailable" || result?.errorStatus === "directions_failed")) {
        meetingState.nativeRouteActive = false;
        meetingState.route = null;
        meetingState.routeError = Boolean(result?.errorStatus);
        meetingState.routingStatus = result?.errorStatus ? "unavailable" : "ready";
        meetingState.errorKey = result?.errorStatus === "routing_unavailable" || result?.errorStatus === "directions_failed"
          ? "app.meeting.errors.route_unavailable"
          : "";
        meetingFlowState = "meeting_point_ready";
        updateMeetingMap();
        if (shouldOpenChat) queueMicrotask(() => { openMeetingChat(); });
        return;
      }

      if (nativeLocation && !nativePoint && !result?.errorStatus) {
        meetingState.nativeRouteActive = false;
        meetingState.route = null;
        meetingState.routeError = false;
        meetingState.routingStatus = "idle";
        meetingState.errorKey = "";
        meetingFlowState = "idle";
        updateMeetingMap();
        if (meetingState.activeCandidate && !meetingState.preparationPending && !meetingState.serverMeeting) {
          queueMicrotask(() => { prepareMeetingPointFromCandidate(); });
        }
        if (shouldOpenChat) queueMicrotask(() => { openMeetingChat(); });
        return;
      }

      meetingState.nativeRouteActive = false;
      meetingState.route = null;
      meetingState.routeError = true;
      meetingState.routingStatus = "unavailable";
      meetingState.meetingPoint = null;

      const errorKey = result?.errorStatus === "location_denied"
        ? "app.meeting.errors.geolocation_denied"
        : result?.errorStatus === "location_unavailable"
          ? "app.meeting.errors.geolocation_unavailable"
          : result?.errorStatus === "map_unavailable"
            ? "app.meeting.errors.map_unavailable"
            : result?.errorStatus === "routing_unavailable" || result?.errorStatus === "directions_failed"
              ? "app.meeting.errors.route_unavailable"
              : "app.meeting.flow.error.body";

      meetingState.errorKey = errorKey;
      meetingFlowState = "error";
      updateMeetingMap();
      if (shouldOpenChat) queueMicrotask(() => { openMeetingChat(); });
    }

    async function ensureMeetingMap() {
      const mapElement = document.getElementById("meetingMap");
      if (!mapElement) return null;

      try {
        const L = await ensureLeaflet();
        if (!meetingState.map) {
          meetingState.map = L.map(mapElement, {
            zoomControl: false,
            attributionControl: true
          });

          L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 19,
            attribution: "&copy; OpenStreetMap"
          }).addTo(meetingState.map);
        }

        meetingState.mapReady = true;
        setTimeout(() => meetingState.map?.invalidateSize(), 80);
        return L;
      } catch (error) {
        setMeetingError("app.meeting.errors.map_unavailable");
        return null;
      }
    }

    function updateMeetingMap() {
      const mapStage = document.getElementById("meetingMapStage");
      const mapEmpty = document.getElementById("meetingMapEmpty");
      if (!mapStage || !mapEmpty) return;

      const showMap = Boolean(meetingState.meetingPoint) && !meetingState.nativeRouteActive;
      mapStage.classList.toggle("is-visible", showMap);
      mapEmpty.style.display = showMap ? "none" : "grid";
      mapEmpty.textContent = t(meetingState.currentPosition && !meetingState.meetingPoint
        ? "app.meeting.map.empty.location_only"
        : "app.meeting.map.empty");

      if (!showMap && meetingState.routeLayer && meetingState.map) {
        meetingState.map.removeLayer(meetingState.routeLayer);
        meetingState.routeLayer = null;
      }
      if (!showMap && meetingState.pointMarker && meetingState.map) {
        meetingState.map.removeLayer(meetingState.pointMarker);
        meetingState.pointMarker = null;
      }

      if (!meetingState.mapReady || !meetingState.map || !window.L) return;

      const L = window.L;

      if (meetingState.currentPosition) {
        if (!meetingState.userMarker) {
          meetingState.userMarker = L.circleMarker([meetingState.currentPosition.lat, meetingState.currentPosition.lng], {
            radius: 8,
            color: "#ffd166",
            weight: 2,
            fillColor: "#ffd166",
            fillOpacity: 0.85
          }).addTo(meetingState.map);
        } else {
          meetingState.userMarker.setLatLng([meetingState.currentPosition.lat, meetingState.currentPosition.lng]);
        }
        meetingState.userMarker.bindTooltip("Du", { permanent: false, direction: "top" });
      }

      if (meetingState.meetingPoint) {
        if (!meetingState.pointMarker) {
          meetingState.pointMarker = L.circleMarker([meetingState.meetingPoint.lat, meetingState.meetingPoint.lng], {
            radius: 8,
            color: "#d8f29f",
            weight: 2,
            fillColor: "#d8f29f",
            fillOpacity: 0.85
          }).addTo(meetingState.map);
        } else {
          meetingState.pointMarker.setLatLng([meetingState.meetingPoint.lat, meetingState.meetingPoint.lng]);
        }
        meetingState.pointMarker.bindTooltip("Treffpunkt", { permanent: false, direction: "top" });
      } else if (meetingState.pointMarker) {
        meetingState.map.removeLayer(meetingState.pointMarker);
        meetingState.pointMarker = null;
      }

      if (meetingState.route?.geometry?.coordinates?.length) {
        const latLngs = meetingState.route.geometry.coordinates.map(([lng, lat]) => [lat, lng]);
        if (!meetingState.routeLayer) {
          meetingState.routeLayer = L.polyline(latLngs, {
            color: "#ffb84d",
            weight: 5,
            opacity: 0.9
          }).addTo(meetingState.map);
        } else {
          meetingState.routeLayer.setLatLngs(latLngs);
        }
      } else if (meetingState.routeLayer) {
        meetingState.map.removeLayer(meetingState.routeLayer);
        meetingState.routeLayer = null;
      }

      const bounds = [];
      if (meetingState.currentPosition) bounds.push([meetingState.currentPosition.lat, meetingState.currentPosition.lng]);
      if (meetingState.meetingPoint) bounds.push([meetingState.meetingPoint.lat, meetingState.meetingPoint.lng]);

      if (bounds.length === 1) {
        meetingState.map.setView(bounds[0], 16);
      } else if (bounds.length > 1) {
        meetingState.map.fitBounds(bounds, { padding: [28, 28] });
      }
    }

    async function getCurrentPosition(options = {}) {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error("app.meeting.errors.geolocation_unavailable"));
          return;
        }

        if (!window.isSecureContext && window.location.protocol !== "file:") {
          reject(new Error("app.meeting.errors.geolocation_insecure"));
          return;
        }

        navigator.geolocation.getCurrentPosition(resolve, reject, {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0,
          ...options
        });
      });
    }

    function resolveGeolocationError(error) {
      if (!navigator.geolocation) return "app.meeting.errors.geolocation_unavailable";
      if (!window.isSecureContext && window.location.protocol !== "file:") return "app.meeting.errors.geolocation_insecure";
      if (error?.message && error.message.startsWith("app.meeting.errors")) return error.message;
      if (error?.code === 1) return "app.meeting.errors.geolocation_denied";
      if (error?.code === 2) return "app.meeting.errors.geolocation_unavailable";
      if (error?.code === 3) return "app.meeting.errors.geolocation_timeout";
      return "app.meeting.errors.geolocation_unavailable";
    }

    async function findNeutralMeetingPoint(lat, lng) {
      const query = `[out:json][timeout:12];
        (
          node["amenity"~"cafe|restaurant|library|community_centre|ice_cream"](around:1400,${lat},${lng});
          way["amenity"~"cafe|restaurant|library|community_centre|ice_cream"](around:1400,${lat},${lng});
        );
        out center 20;`;
      const controller = typeof AbortController === "function" ? new AbortController() : null;
      const timeout = window.setTimeout(() => controller?.abort(), 12000);

      let data;
      try {
        const response = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`, {
          signal: controller?.signal
        });
        if (!response.ok) throw new Error("app.meeting.errors.point_unavailable");
        data = await response.json();
      } catch (error) {
        throw new Error("app.meeting.errors.point_unavailable");
      } finally {
        window.clearTimeout(timeout);
      }

      const candidates = Array.isArray(data?.elements) ? data.elements : [];
      if (!candidates.length) throw new Error("app.meeting.errors.point_unavailable");

      const normalized = candidates
        .map((item) => {
          const pointLat = item.lat ?? item.center?.lat;
          const pointLng = item.lon ?? item.center?.lon;
          if (!Number.isFinite(pointLat) || !Number.isFinite(pointLng)) return null;

          const name = item.tags?.name
            || item.tags?.brand
            || item.tags?.amenity?.replace(/_/g, " ")
            || "Treffpunkt";

          return {
            name,
            lat: pointLat,
            lng: pointLng,
            distance: distanceBetween({ lat, lng }, { lat: pointLat, lng: pointLng })
          };
        })
        .filter(Boolean)
        .sort((a, b) => a.distance - b.distance);

      if (!normalized.length) throw new Error("app.meeting.errors.point_unavailable");
      return normalized[0];
    }

    async function calculateMeetingRoute() {
      if (!meetingState.currentPosition || !meetingState.meetingPoint) return;

      try {
        const from = `${meetingState.currentPosition.lng},${meetingState.currentPosition.lat}`;
        const to = `${meetingState.meetingPoint.lng},${meetingState.meetingPoint.lat}`;
        const response = await fetch(`https://router.project-osrm.org/route/v1/walking/${from};${to}?overview=full&geometries=geojson&steps=false`);
        if (!response.ok) throw new Error("app.meeting.errors.route_unavailable");
        const data = await response.json();
        const route = Array.isArray(data?.routes) ? data.routes[0] : null;
        if (!route) throw new Error("app.meeting.errors.route_unavailable");
        meetingState.route = route;
        meetingState.routeError = false;
        meetingState.routingStatus = "active";
      } catch (error) {
        meetingState.route = null;
        meetingState.routeError = true;
        meetingState.routingStatus = "unavailable";
        meetingState.errorKey = "app.meeting.errors.route_unavailable";
      }
    }

    function stopMeetingWatch() {
      if (meetingState.watchId !== null && navigator.geolocation) {
        navigator.geolocation.clearWatch(meetingState.watchId);
      }
      meetingState.watchId = null;
    }

    function maybeMarkArrival() {
      if (!meetingState.currentPosition || !meetingState.meetingPoint) return;
      const directDistance = distanceBetween(meetingState.currentPosition, meetingState.meetingPoint);
      if (directDistance <= 35) {
        if (meetingState.serverMeeting?.both_arrived) {
          meetingFlowState = "arrived";
          meetingState.routingStatus = "arrived";
          stopMeetingWatch();
        }
      }
    }

    async function requestMeetingSetup() {
      const hasUsableLocation = Boolean(meetingState.currentPosition) && meetingState.permission === "granted" && !meetingState.activeCandidate;
      meetingState.loading = true;
      meetingState.errorKey = "";
      meetingState.meetingPoint = null;
      meetingState.route = null;
      meetingState.routeError = false;
      meetingState.routingStatus = "idle";
      meetingState.permission = hasUsableLocation ? "granted" : "requesting";
      meetingFlowState = "loading";
      updateMeetingUI();

      try {
        if (hasUsableLocation) {
          if (window.CYPNative?.openMeetingMap) {
            const nativeResult = await openNativeMeetingMap();
            applyNativeMeetingMapResult(nativeResult);
            if (meetingState.meetingPoint || nativeResult?.errorStatus) {
              meetingState.loading = false;
              updateMeetingUI();
              scheduleMatchingSync("location");
              return;
            }
          }

          meetingState.meetingPoint = await findNeutralMeetingPoint(meetingState.currentPosition.lat, meetingState.currentPosition.lng);
          await calculateMeetingRoute();
          meetingState.routingStatus = meetingState.route ? "active" : "ready";
          meetingFlowState = meetingState.route ? "navigating" : "meeting_point_ready";
          await ensureMeetingMap();
          meetingState.loading = false;
          updateMeetingMap();
          updateMeetingUI();
          scheduleMatchingSync("location");
          return;
        }

        if (window.CYPNative?.openMeetingMap) {
          const candidateLocation = meetingState.activeCandidate?.location?.lat != null && meetingState.activeCandidate?.location?.lng != null
            ? {
                lat: meetingState.activeCandidate.location.lat,
                lng: meetingState.activeCandidate.location.lng
              }
            : null;
          const nativeResult = await openNativeMeetingMap({ candidateLocation });
          applyNativeMeetingMapResult(nativeResult);
          meetingState.loading = false;
          updateMeetingUI();
          scheduleMatchingSync("location");
          return;
        }

        const position = await getCurrentPosition();
        meetingState.permission = "granted";
        meetingState.currentPosition = {
          lat: position.coords.latitude,
          lng: position.coords.longitude
        };
        meetingState.lastLocationAt = new Date().toISOString();

        meetingState.meetingPoint = await findNeutralMeetingPoint(position.coords.latitude, position.coords.longitude);
        await calculateMeetingRoute();
        meetingState.routingStatus = meetingState.route ? "active" : "ready";
        meetingFlowState = meetingState.route ? "navigating" : "meeting_point_ready";
        await ensureMeetingMap();
        meetingState.loading = false;
        updateMeetingMap();
        updateMeetingUI();
        scheduleMatchingSync("location");
      } catch (error) {
        const errorKey = error?.message?.startsWith("app.meeting.errors.")
          ? error.message
          : resolveGeolocationError(error);
        setMeetingError(errorKey);
      }
    }

    async function startMeetingNavigation() {
      if (!meetingState.meetingPoint || !meetingState.currentPosition) {
        await requestMeetingSetup();
        return;
      }

      meetingState.loading = true;
      meetingFlowState = "loading";
      updateMeetingUI();

      if (window.CYPNative?.openMeetingMap) {
        try {
          const currentUserId = authState.user?.id || "";
          const acceptedBy = new Set(meetingState.serverMeeting?.accepted_by || []);
          const arrivedBy = new Set(meetingState.serverMeeting?.arrived_by || []);
          const okBy = new Set(meetingState.serverMeeting?.ok_by || []);
          const acceptance = meetingState.serverMeeting
            ? {
                youAccepted: currentUserId ? acceptedBy.has(currentUserId) : false,
                otherAccepted: Boolean(meetingState.serverMeeting.fully_accepted)
                  ? true
                  : Array.from(acceptedBy).some((id) => id !== currentUserId),
                fullyAccepted: Boolean(meetingState.serverMeeting.fully_accepted)
              }
            : null;
          const arrival = meetingState.serverMeeting
            ? {
                youArrived: currentUserId ? arrivedBy.has(currentUserId) : false,
                otherArrived: Boolean(meetingState.serverMeeting.both_arrived)
                  ? true
                  : Array.from(arrivedBy).some((id) => id !== currentUserId),
                bothArrived: Boolean(meetingState.serverMeeting.both_arrived)
              }
            : null;
          const ok = meetingState.serverMeeting
            ? {
                youOk: currentUserId ? okBy.has(currentUserId) : false,
                otherOk: Boolean(meetingState.serverMeeting.both_ok)
                  ? true
                  : Array.from(okBy).some((id) => id !== currentUserId),
                bothOk: Boolean(meetingState.serverMeeting.both_ok),
                chatUnlocked: Boolean(meetingState.serverMeeting.chat_unlocked)
              }
            : null;
          const meetingContext = meetingState.serverMeeting && authState.token
            ? {
                meetingId: meetingState.serverMeeting.id,
                backendOrigin: getBackendOrigin(),
                authToken: authState.token
              }
            : null;
          const nativeResult = await openNativeMeetingMap({ meetingPoint: meetingState.meetingPoint, acceptance, arrival, ok, meetingContext });
          applyNativeMeetingMapResult(nativeResult);
          meetingState.loading = false;
          maybeMarkArrival();
          updateMeetingUI();
          scheduleMatchingSync("location");
          return;
        } catch (error) {
          if (error?.message !== "native-map-unavailable" && error?.message !== "native-map-timeout") {
            applyNativeMeetingMapResult({ errorStatus: "map_unavailable", meetingPoint: null, routeMeta: null, location: null });
            meetingState.loading = false;
            updateMeetingUI();
            return;
          }
        }
      }

      await ensureMeetingMap();
      await calculateMeetingRoute();

      if (navigator.geolocation) {
        stopMeetingWatch();
        meetingState.watchId = navigator.geolocation.watchPosition((position) => {
          meetingState.permission = "granted";
          meetingState.currentPosition = {
            lat: position.coords.latitude,
            lng: position.coords.longitude
          };
          meetingState.lastLocationAt = new Date().toISOString();
          maybeMarkArrival();
          updateMeetingMap();
          updateMeetingUI();
          scheduleMatchingSync("location");
        }, (error) => {
          stopMeetingWatch();
          setMeetingError(resolveGeolocationError(error));
        }, {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 1000
        });
      }

      meetingFlowState = meetingState.routingStatus === "arrived" ? "arrived" : "navigating";
      meetingState.loading = false;
      maybeMarkArrival();
      updateMeetingMap();
      updateMeetingUI();
      scheduleMatchingSync("location");
    }

    async function refreshMeetingLocation() {
      try {
        meetingState.permission = "requesting";
        updateMeetingUI();
        const position = await getCurrentPosition();
        meetingState.permission = "granted";
        meetingState.currentPosition = {
          lat: position.coords.latitude,
          lng: position.coords.longitude
        };
        meetingState.lastLocationAt = new Date().toISOString();
        maybeMarkArrival();
        updateMeetingMap();
        updateMeetingUI();
        scheduleMatchingSync("location");
      } catch (error) {
        setMeetingError(resolveGeolocationError(error));
      }
    }

    function formatChatTimestamp(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return new Intl.DateTimeFormat(lang === "en" ? "en-US" : "de-DE", {
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function chatLiveEnabled() {
      const chatScreenActive = document.querySelector('[data-screen="chat"]')?.classList.contains("active");
      return Boolean(
        chatScreenActive
        && authState.token
        && meetingState.serverMeeting?.id
        && meetingState.serverMeeting?.chat_unlocked
      );
    }

    function stopChatLiveRefresh() {
      if (meetingState.chatPollTimer) {
        clearTimeout(meetingState.chatPollTimer);
        meetingState.chatPollTimer = null;
      }
      meetingState.chatLiveActive = false;
      meetingState.chatRetryCount = 0;
    }

    function formatChatLiveLabel() {
      if (meetingState.chatError && meetingState.chatLiveActive) return t("app.meeting.chat.reconnecting");
      if (meetingState.chatError) return t("app.meeting.chat.error");
      if (!meetingState.chatLiveActive || !meetingState.lastChatSyncAt) return t("app.meeting.chat.live.idle");
      const diffMs = Math.max(0, Date.now() - new Date(meetingState.lastChatSyncAt).getTime());
      const minutes = Math.floor(diffMs / 60000);
      if (minutes < 1) return t("app.meeting.chat.live.now");
      return tFormat("app.meeting.chat.live.minutes", { count: minutes });
    }

    function getChatQueueStorageBucket() {
      return `${authState.user?.id || "guest"}:${meetingState.serverMeeting?.id || "no-meeting"}`;
    }

    function isValidQueuedChatMessage(message) {
      if (!message || typeof message !== "object") return false;
      if (!message.local_id || !message.text || message.delivery_state !== "queued") return false;
      const createdAt = new Date(message.created_at || 0).getTime();
      if (!Number.isFinite(createdAt) || createdAt <= 0) return false;
      return (Date.now() - createdAt) <= CHAT_QUEUE_MAX_AGE_MS;
    }

    function cleanupPersistedQueuedMessageStore(store, { currentMessages = [] } = {}) {
      const cleaned = {};
      const serverKeys = new Set(
        (currentMessages || [])
          .filter((message) => message?.id)
          .map((message) => `${message.sender_user_id || "unknown"}-${message.text || ""}`)
      );

      Object.entries(store || {}).forEach(([bucket, messages]) => {
        if (!Array.isArray(messages)) return;
        const validMessages = messages.filter((message) => {
          if (!isValidQueuedChatMessage(message)) return false;
          const replacementKey = `${message.sender_user_id || "unknown"}-${message.text || ""}`;
          return !serverKeys.has(replacementKey);
        });
        if (validMessages.length) {
          cleaned[bucket] = validMessages;
        }
      });

      return cleaned;
    }

    function readPersistedQueuedMessages() {
      try {
        const raw = localStorage.getItem(CHAT_QUEUE_STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : {};
        const store = parsed && typeof parsed === "object" ? parsed : {};
        const cleaned = cleanupPersistedQueuedMessageStore(store, { currentMessages: meetingState.chatMessages });
        if (JSON.stringify(cleaned) !== JSON.stringify(store)) {
          writePersistedQueuedMessages(cleaned);
        }
        return cleaned;
      } catch {
        return {};
      }
    }

    function writePersistedQueuedMessages(store) {
      try {
        localStorage.setItem(CHAT_QUEUE_STORAGE_KEY, JSON.stringify(store));
      } catch {}
    }

    function persistQueuedChatMessages() {
      const store = cleanupPersistedQueuedMessageStore(readPersistedQueuedMessages(), { currentMessages: meetingState.chatMessages });
      const bucket = getChatQueueStorageBucket();
      const queuedMessages = getQueuedChatMessages().map((message) => ({
        local_id: message.local_id,
        sender_user_id: message.sender_user_id,
        text: message.text,
        created_at: message.created_at,
        delivery_state: "queued"
      }));

      if (queuedMessages.length) {
        store[bucket] = queuedMessages;
      } else {
        delete store[bucket];
      }
      writePersistedQueuedMessages(store);
    }

    function restoreQueuedChatMessages() {
      const store = cleanupPersistedQueuedMessageStore(readPersistedQueuedMessages(), { currentMessages: meetingState.chatMessages });
      const queuedMessages = store[getChatQueueStorageBucket()] || [];
      if (!queuedMessages.length) return;
      meetingState.chatMessages = mergeChatMessages(queuedMessages);
      writePersistedQueuedMessages(store);
    }

    function createLocalChatMessage(text) {
      return {
        local_id: `local-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
        sender_user_id: authState.user?.id || "",
        text,
        created_at: new Date().toISOString(),
        delivery_state: "sending"
      };
    }

    function replaceLocalChatMessage(localId, replacement) {
      meetingState.chatMessages = meetingState.chatMessages.map((message) => {
        if (message.local_id !== localId) return message;
        return replacement
          ? {
              ...replacement,
              delivery_state: replacement.delivery_state || "sent"
            }
          : message;
      });
      persistQueuedChatMessages();
    }

    function updateLocalChatMessageStatus(localId, deliveryState) {
      meetingState.chatMessages = meetingState.chatMessages.map((message) => {
        if (message.local_id !== localId) return message;
        return {
          ...message,
          delivery_state: deliveryState
        };
      });
      persistQueuedChatMessages();
    }

    function isChatNetworkFailure(error) {
      if (!navigator.onLine) return true;
      const message = String(error?.message || "").toLowerCase();
      return message.includes("failed to fetch")
        || message.includes("network")
        || message.includes("load failed")
        || message.includes("fetch");
    }

    function getQueuedChatMessages() {
      return meetingState.chatMessages.filter((message) => message?.local_id && message.delivery_state === "queued");
    }

    async function flushQueuedChatMessages() {
      if (!chatLiveEnabled() || meetingState.chatLoading || !navigator.onLine) return;
      const queuedMessages = getQueuedChatMessages();
      if (!queuedMessages.length) return;

      for (const queuedMessage of queuedMessages) {
        if (!chatLiveEnabled() || meetingState.chatLoading || !navigator.onLine) return;
        await sendExistingChatMessage(queuedMessage.local_id);
      }
    }

    async function sendExistingChatMessage(localId) {
      const message = meetingState.chatMessages.find((entry) => entry.local_id === localId);
      if (!message || !message.text || !meetingState.serverMeeting?.id || !meetingState.serverMeeting?.chat_unlocked) return;

      updateLocalChatMessageStatus(localId, "sending");
      meetingState.chatLoading = true;
      meetingState.chatError = "";
      updateMeetingUI();

      try {
        const sentMessage = await sendSharedChatMessage(meetingState.serverMeeting.id, message.text);
        if (sentMessage) {
          replaceLocalChatMessage(localId, sentMessage);
          meetingState.chatMessages = mergeChatMessages([]);
          meetingState.lastChatSyncAt = new Date().toISOString();
        } else {
          updateLocalChatMessageStatus(localId, "failed");
          meetingState.chatError = t("app.meeting.chat.error");
        }
      } catch (error) {
        if (isChatNetworkFailure(error)) {
          updateLocalChatMessageStatus(localId, "queued");
          meetingState.chatError = "";
        } else {
          updateLocalChatMessageStatus(localId, "failed");
          meetingState.chatError = error.message;
        }
      } finally {
        meetingState.chatLoading = false;
        updateMeetingUI();
      }
    }

    function mergeChatMessages(messages) {
      const merged = new Map();
      [...meetingState.chatMessages, ...(messages || [])].forEach((message) => {
        if (!message) return;
        const key = message.id || message.local_id || `${message.sender_user_id || "unknown"}-${message.created_at || ""}-${message.text || ""}`;
        merged.set(key, {
          ...message,
          delivery_state: message.delivery_state || (message.id ? "sent" : "sending")
        });
      });
      return Array.from(merged.values()).sort((a, b) => {
        return new Date(a.created_at || 0).getTime() - new Date(b.created_at || 0).getTime();
      });
    }

    async function refreshChatHistory({ silent = false } = {}) {
      if (!meetingState.serverMeeting?.id || !authState.token || !meetingState.serverMeeting?.chat_unlocked) return;
      if (!silent) {
        meetingState.chatLoading = true;
        meetingState.chatError = "";
        updateMeetingUI();
      }
      try {
        const messages = await loadSharedChatHistory(meetingState.serverMeeting.id);
        meetingState.chatMessages = mergeChatMessages(messages);
        restoreQueuedChatMessages();
        meetingState.lastChatSyncAt = new Date().toISOString();
        meetingState.chatError = "";
        meetingState.chatRetryCount = 0;
        persistQueuedChatMessages();
        return true;
      } catch (error) {
        meetingState.chatError = error.message;
        return false;
      } finally {
        if (!silent) {
          meetingState.chatLoading = false;
        }
        updateMeetingUI();
      }
    }

    function scheduleNextChatRefresh(delay = 6000) {
      if (!chatLiveEnabled()) return;
      if (meetingState.chatPollTimer) {
        clearTimeout(meetingState.chatPollTimer);
      }
      meetingState.chatPollTimer = window.setTimeout(async () => {
        meetingState.chatPollTimer = null;
        if (!chatLiveEnabled()) {
          stopChatLiveRefresh();
          updateMeetingUI();
          return;
        }
        const ok = await refreshChatHistory({ silent: true });
        if (ok === false) {
          meetingState.chatRetryCount += 1;
        } else {
          await flushQueuedChatMessages();
        }
        if (chatLiveEnabled()) {
          const nextDelay = ok === false
            ? Math.min(30000, 6000 * (2 ** Math.min(meetingState.chatRetryCount, 2)))
            : 6000;
          scheduleNextChatRefresh(nextDelay);
        }
      }, delay);
    }

    function reconcileChatLiveRefresh() {
      if (chatLiveEnabled()) {
        meetingState.chatLiveActive = true;
        if (!meetingState.chatPollTimer) {
          scheduleNextChatRefresh();
        }
      } else {
        stopChatLiveRefresh();
      }
      updateMeetingUI();
    }

    function renderRadarState() {

      const titleEl = document.getElementById("radarStatusTitle");
      const bodyEl = document.getElementById("radarStatusBody");

      titleEl.textContent = t(`app.radar.status.${stateKey}.title`);
