    function renderMeetingFlow() {
      const titleEl = document.getElementById("meetingFlowTitle");
      const bodyEl = document.getElementById("meetingFlowBody");
      const ctaEl = document.getElementById("meetingFlowCta");
      const sequenceEl = document.getElementById("meetingFlowSequence");
      const routeCardEl = document.getElementById("meetingRouteCard");
      const routeTitleEl = document.getElementById("meetingRouteTitle");
      const routeSubtitleEl = document.getElementById("meetingRouteSubtitle");
      const routeChipEl = document.getElementById("meetingRouteChip");
      const routeDistanceEl = document.getElementById("meetingRouteDistance");
      const routeEtaEl = document.getElementById("meetingRouteEta");
      const permissionChipEl = document.getElementById("meetingPermissionChip");
      const routingChipEl = document.getElementById("meetingRoutingChip");
      if (!titleEl || !bodyEl || !ctaEl || !sequenceEl || !routeCardEl || !routeTitleEl || !routeSubtitleEl || !routeChipEl || !routeDistanceEl || !routeEtaEl || !permissionChipEl || !routingChipEl) return;

      const candidatePreparedState = meetingFlowState === "idle" && Boolean(meetingState.activeCandidate);
      const locationReadyState = meetingFlowState === "idle" && meetingState.permission === "granted" && !meetingState.activeCandidate && !meetingState.meetingPoint;
      const currentUserId = authState.user?.id || "";
      const acceptedBy = new Set(meetingState.serverMeeting?.accepted_by || []);
      const arrivedBy = new Set(meetingState.serverMeeting?.arrived_by || []);
      const okBy = new Set(meetingState.serverMeeting?.ok_by || []);
      const youAccepted = currentUserId ? acceptedBy.has(currentUserId) : false;
      const fullyAccepted = Boolean(meetingState.serverMeeting?.fully_accepted);
      const youArrived = currentUserId ? arrivedBy.has(currentUserId) : false;
      const bothArrived = Boolean(meetingState.serverMeeting?.both_arrived);
      const youOk = currentUserId ? okBy.has(currentUserId) : false;
      const bothOk = Boolean(meetingState.serverMeeting?.both_ok);
      const chatUnlocked = Boolean(meetingState.serverMeeting?.chat_unlocked);
      const waitingAcceptanceState = meetingFlowState === "meeting_point_ready" && Boolean(meetingState.serverMeeting) && !fullyAccepted;
      const arrivalState = (meetingFlowState === "navigating" || meetingFlowState === "arrived") && Boolean(meetingState.serverMeeting) && fullyAccepted;

      if (waitingAcceptanceState) {
        titleEl.textContent = youAccepted
          ? t("app.meeting.flow.meeting_point_ready.accept_other_title")
          : t("app.meeting.flow.meeting_point_ready.accept_you_title");
        bodyEl.textContent = youAccepted
          ? t("app.meeting.flow.meeting_point_ready.accept_other_body")
          : t("app.meeting.flow.meeting_point_ready.accept_you_body");
        ctaEl.textContent = youAccepted
          ? t("app.meeting.flow.meeting_point_ready.accept_other_cta")
          : t("app.meeting.flow.meeting_point_ready.accept_you_cta");
      } else if (meetingFlowState === "meeting_point_ready" && fullyAccepted) {
        titleEl.textContent = t("app.meeting.flow.meeting_point_ready.accepted_title");
        bodyEl.textContent = t("app.meeting.flow.meeting_point_ready.accepted_body");
        ctaEl.textContent = t("app.meeting.flow.meeting_point_ready.accepted_cta");
      } else if (arrivalState) {
        if (bothArrived && bothOk) {
          titleEl.textContent = t("app.meeting.flow.arrived.ok_both_title");
          bodyEl.textContent = t("app.meeting.flow.arrived.ok_both_body");
          ctaEl.textContent = t("app.meeting.flow.arrived.ok_both_cta");
        } else if (bothArrived && youOk) {
          titleEl.textContent = t("app.meeting.flow.arrived.ok_other_title");
          bodyEl.textContent = t("app.meeting.flow.arrived.ok_other_body");
          ctaEl.textContent = t("app.meeting.flow.arrived.ok_other_cta");
        } else if (bothArrived) {
          titleEl.textContent = t("app.meeting.flow.arrived.ok_you_title");
          bodyEl.textContent = t("app.meeting.flow.arrived.ok_you_body");
          ctaEl.textContent = t("app.meeting.flow.arrived.ok_you_cta");
        } else if (youArrived) {
          titleEl.textContent = t("app.meeting.flow.navigating.arrive_other_title");
          bodyEl.textContent = t("app.meeting.flow.navigating.arrive_other_body");
          ctaEl.textContent = t("app.meeting.flow.navigating.arrive_other_cta");
        } else {
          titleEl.textContent = t("app.meeting.flow.navigating.arrive_you_title");
          bodyEl.textContent = t("app.meeting.flow.navigating.arrive_you_body");
          ctaEl.textContent = t("app.meeting.flow.navigating.arrive_you_cta");
        }
      } else {
        const loadingLocationState = meetingFlowState === "loading" && meetingState.permission === "requesting";
        titleEl.textContent = loadingLocationState
          ? t("app.meeting.flow.loading.location_title")
          : candidatePreparedState
            ? t("app.meeting.flow.idle.candidate_title")
            : locationReadyState
              ? t("app.meeting.flow.idle.ready_title")
              : t(`app.meeting.flow.${meetingFlowState}.title`);
        bodyEl.textContent = loadingLocationState
          ? t("app.meeting.flow.loading.location_body")
          : candidatePreparedState
            ? t(meetingState.preparationNoteKey || "app.meeting.flow.idle.candidate_body")
            : locationReadyState
              ? t("app.meeting.flow.idle.ready_body")
              : t(meetingState.errorKey && meetingFlowState === "error" ? meetingState.errorKey : `app.meeting.flow.${meetingFlowState}.body`);
        ctaEl.textContent = loadingLocationState
          ? t("app.meeting.flow.loading.location_cta")
          : locationReadyState
            ? t("app.meeting.flow.idle.ready_cta")
            : t(`app.meeting.flow.${meetingFlowState}.cta`);
      }

      const hasStaleLocationLoading = locationReadyState && meetingState.loading;
      ctaEl.disabled = (meetingState.loading && !hasStaleLocationLoading) || meetingFlowState === "loading" || (waitingAcceptanceState && youAccepted) || (arrivalState && ((youArrived && !bothArrived) || (bothArrived && youOk)));
      ctaEl.style.opacity = ctaEl.disabled ? "0.6" : "1";

      const activeIndex = meetingFlowState === "idle" || meetingFlowState === "loading" || meetingFlowState === "error"
        ? 0
        : meetingFlowState === "meeting_point_ready"
          ? 1
          : meetingFlowState === "navigating"
            ? 2
            : 3;

      sequenceEl.innerHTML = meetingFlowSteps.map((step, index) => {
        const stateClass = index < activeIndex
          ? "is-done"
          : index === activeIndex
            ? "is-active"
            : "";
        const indexLabel = index < activeIndex ? "✓" : `${index + 1}`;

        return `
          <div class="flow-step ${stateClass}">
            <div class="flow-step-index">${indexLabel}</div>
            <div class="flow-step-label">${t(step.key)}</div>
          </div>
        `;
      }).join("");

      const routeVisible = Boolean(meetingState.meetingPoint);
      const routeDistance = meetingState.route?.distance;
      const routeDuration = meetingState.route?.duration;
      routeCardEl.classList.toggle("is-visible", routeVisible);
      permissionChipEl.textContent = t(`app.meeting.permission.${meetingState.permission}`);
      routingChipEl.textContent = t(`app.meeting.routing.${meetingState.routingStatus}`);
      permissionChipEl.style.display = routeVisible && meetingState.permission === "granted" ? "none" : "inline-flex";
      routingChipEl.style.display = "inline-flex";

      if (routeVisible) {
        const directDistance = meetingState.currentPosition && meetingState.meetingPoint
          ? distanceBetween(meetingState.currentPosition, meetingState.meetingPoint)
          : NaN;
        routeTitleEl.textContent = meetingState.meetingPoint.name;
        routeSubtitleEl.textContent = meetingState.nativeRouteActive
          ? t("app.meeting.route.card.subtitle.native")
          : t(`app.meeting.route.card.subtitle.${meetingFlowState === "arrived" ? "arrived" : meetingFlowState === "navigating" ? "navigating" : "meeting_point_ready"}`);
        routeChipEl.textContent = t(`app.meeting.route.card.chip.${meetingFlowState === "arrived" ? "arrived" : meetingFlowState === "navigating" ? "navigating" : "meeting_point_ready"}`);
        routeDistanceEl.textContent = `${t("app.meeting.route.meta.distance_label")}: ${formatDistance(routeDistance ?? directDistance)}`;
        routeEtaEl.textContent = `${t("app.meeting.route.meta.duration_label")}: ${formatDuration(routeDuration)}`;
      }

    }

    function updateMeetingUI() {
      renderMeetingFlow();
      updateMeetingMap();
      updateProfileUI();
      renderChatScreen();
    }

    async function openMeetingChat() {
      if (!meetingState.serverMeeting?.id || !meetingState.serverMeeting?.chat_unlocked) {
        updateMeetingUI();
        return;
      }
      meetingState.chatLoading = true;
      meetingState.chatError = "";
      updateMeetingUI();
      try {
        const unlockedMeeting = await unlockSharedChat(meetingState.serverMeeting.id);
        if (unlockedMeeting) {
          applyServerMeeting(unlockedMeeting);
        }
        await refreshChatHistory({ silent: false });
        meetingState.chatOpen = true;
        activateScreen("chat");
      } catch (error) {
        meetingState.chatError = error.message;
      } finally {
        meetingState.chatLoading = false;
        updateMeetingUI();
      }
    }

    function renderChatScreen() {
      const screenStatusEl = document.getElementById("chatScreenStatus");
      const screenChipEl = document.getElementById("chatScreenChip");
      const threadEl = document.getElementById("chatScreenThread");
      const inputEl = document.getElementById("chatScreenInput");
      const sendButtonEl = document.getElementById("chatScreenSendButton");
      if (!screenStatusEl || !screenChipEl || !threadEl || !inputEl || !sendButtonEl) return;

      const chatUnlocked = Boolean(meetingState.serverMeeting?.chat_unlocked);
      screenChipEl.textContent = chatUnlocked ? t("app.meeting.chat.chip.open") : t("app.meeting.chat.chip.locked");
      screenStatusEl.textContent = meetingState.chatError
        ? (meetingState.chatLiveActive ? `${t("app.meeting.chat.reconnecting")} · ${formatChatLiveLabel()}` : t("app.meeting.chat.error"))
        : meetingState.chatLoading
          ? t("app.meeting.chat.loading")
          : chatUnlocked
            ? `${t("app.meeting.chat.ready")} ${meetingState.chatLiveActive ? `· ${t("app.meeting.chat.live.active")}` : ""} ${formatChatLiveLabel()}`.trim()
            : t("app.meeting.chat.locked");

      inputEl.disabled = !chatUnlocked || meetingState.chatLoading;
      sendButtonEl.disabled = !chatUnlocked || meetingState.chatLoading || !inputEl.value.trim();
      sendButtonEl.style.opacity = sendButtonEl.disabled ? "0.6" : "1";

      const currentUserId = authState.user?.id || "";
      threadEl.innerHTML = meetingState.chatMessages.length
        ? meetingState.chatMessages.map((message) => {
            const mine = message.sender_user_id === currentUserId;
            const sender = mine ? t("app.meeting.chat.sender.me") : t("app.meeting.chat.sender.other");
            const time = formatChatTimestamp(message.created_at);
            const deliveryState = mine ? (message.delivery_state || "sent") : "";
            const deliveryLabel = mine ? t(`app.meeting.chat.message.${deliveryState}`) : "";
            return `
              <div class="chat-bubble ${mine ? "is-mine" : ""} ${deliveryState === "failed" ? "is-failed" : ""}">
                <div class="chat-bubble-head">
                  <strong>${sender}</strong>
                  <span class="chat-bubble-time">${time}</span>
                </div>
                <div>${String(message.text || "")}</div>
                ${deliveryLabel ? `<div class="chat-bubble-status ${deliveryState === "failed" ? "is-failed" : ""}">${deliveryLabel}</div>` : ""}
                ${mine && deliveryState === "failed"
                  ? `<button class="chat-bubble-retry" type="button" data-chat-retry="${message.local_id}" ${meetingState.chatLoading ? "disabled" : ""}>${t("app.meeting.chat.message.retry")}</button>`
                  : ""}
              </div>
            `;
          }).join("")
        : `<div class="chat-bubble">${t(chatUnlocked ? "app.meeting.chat.empty" : "app.meeting.chat.locked")}</div>`;
    }

    applyI18n();
    window.addEventListener("cyp:native-camera-scan", (event) => {
      handleNativeCameraScanResult(event.detail);
    });
    setAuthMode(authMode);
    setAuthNote(authState.noteKey);
    setTab(activeTab);
    renderRadarState();
    updateProfileUI();
    updateMeetingUI();
    restoreAuthSession();

    document.querySelectorAll("[data-action='go-screen']").forEach((button) => {
      button.addEventListener("click", () => activateScreen(button.dataset.targetScreen));
    });

    document.querySelectorAll("[data-auth-mode]").forEach((button) => {
      button.addEventListener("click", () => setAuthMode(button.dataset.authMode));
    });

    document.getElementById("authSubmit")?.addEventListener("click", async () => {
      await submitAuth();
    });

    document.querySelectorAll("[data-tab-target]").forEach((button) => {
      button.addEventListener("click", () => setTab(button.dataset.tabTarget));
    });

    document.getElementById("radarStartButton")?.addEventListener("click", async () => {
      try {
        meetingState.permission = "requesting";
        renderRadarState();
        const position = await getCurrentPosition();
        meetingState.permission = "granted";
        meetingState.currentPosition = {
          lat: position.coords.latitude,
          lng: position.coords.longitude
        };
        meetingState.lastLocationAt = new Date().toISOString();
        radarActive = true;
        lastRadarActivationAt = new Date().toISOString();
        renderRadarState();
        updateMeetingUI();
        scheduleMatchingSync("location");
        scheduleMatchingSync("radar");
      } catch (error) {
        const errorKey = resolveGeolocationError(error);
        radarActive = false;
        meetingState.errorKey = errorKey;
        meetingState.permission = errorKey === "app.meeting.errors.geolocation_denied"
          ? "denied"
          : errorKey === "app.meeting.errors.geolocation_timeout"
            ? "timeout"
            : errorKey === "app.meeting.errors.geolocation_insecure"
              ? "insecure"
              : "unavailable";
        renderRadarState();
        updateMeetingUI();
      }
    });

    document.getElementById("radarStopButton")?.addEventListener("click", () => {
      radarActive = false;
      renderRadarState();
      updateProfileUI();
      scheduleMatchingSync("radar");
    });

    document.getElementById("profileCameraButton")?.addEventListener("click", async () => {
      if (profileState.stream) {
        stopProfileCamera();
      } else {
        await startProfileCamera();
      }
    });

    document.getElementById("profileScanButton")?.addEventListener("click", async () => {
      await runProfileScan();
    });

    document.getElementById("profilePhotoUploadButton")?.addEventListener("click", async () => {
      await uploadProfilePhoto();
    });

    document.getElementById("profilePhotoDeleteButton")?.addEventListener("click", async () => {
      await deleteProfilePhoto();
    });

    document.getElementById("profileSafetyContactSaveButton")?.addEventListener("click", async () => {
      await saveSafetyCircleContact();
    });

    document.getElementById("profileSafetyAlarmButton")?.addEventListener("click", async () => {
      await triggerSafetyAlarm();
    });

    document.getElementById("profileSafetyAlarmCancelButton")?.addEventListener("click", async () => {
      await cancelSafetyAlarm();
    });

    document.getElementById("profileSafetyContactCancelButton")?.addEventListener("click", () => {
      resetSafetyCircleForm();
      authState.safetyCircleStatusKey = authState.safetyCircleContacts.length
        ? "app.profile.safety.circle.status.saved"
        : "app.profile.safety.circle.status.idle";
      authState.safetyCircleErrorKey = "";
      updateProfileUI();
    });

    document.getElementById("profileSafetyCircleList")?.addEventListener("click", async (event) => {
      const target = event.target instanceof HTMLElement ? event.target : null;
      if (!target) return;
      if (target.dataset.safetyEdit) {
        startSafetyCircleEdit(target.dataset.safetyEdit);
        return;
      }
      if (target.dataset.safetyDelete) {
        await deleteSafetyCircleContact(target.dataset.safetyDelete);
        return;
      }
      if (target.dataset.safetyPrimary) {
        await makePrimarySafetyCircleContact(target.dataset.safetyPrimary);
      }
    });

    document.getElementById("profilePhoneRequestButton")?.addEventListener("click", async () => {
      await requestPhoneVerification();
    });

    document.getElementById("profilePhoneVerifyButton")?.addEventListener("click", async () => {
      await verifyPhoneCode();
    });

    document.getElementById("meetingFlowCta")?.addEventListener("click", () => {
      const locationReadyState = meetingFlowState === "idle" && meetingState.permission === "granted" && !meetingState.activeCandidate && !meetingState.meetingPoint;
      if (meetingState.loading && !locationReadyState) return;

      const currentUserId = authState.user?.id || "";
      const acceptedBy = new Set(meetingState.serverMeeting?.accepted_by || []);
      const arrivedBy = new Set(meetingState.serverMeeting?.arrived_by || []);
      const okBy = new Set(meetingState.serverMeeting?.ok_by || []);
      const fullyAccepted = Boolean(meetingState.serverMeeting?.fully_accepted);
      const youAccepted = currentUserId ? acceptedBy.has(currentUserId) : false;
      const youArrived = currentUserId ? arrivedBy.has(currentUserId) : false;
      const bothArrived = Boolean(meetingState.serverMeeting?.both_arrived);
      const youOk = currentUserId ? okBy.has(currentUserId) : false;
      const bothOk = Boolean(meetingState.serverMeeting?.both_ok);

      if (meetingFlowState === "idle" || meetingFlowState === "error") {
        requestMeetingSetup();
        return;
      }

      if (meetingFlowState === "meeting_point_ready") {
        if (meetingState.serverMeeting && !fullyAccepted) {
          if (youAccepted) return;
          meetingState.loading = true;
          updateMeetingUI();
          acceptSharedMeeting(meetingState.serverMeeting.id)
            .then((meeting) => {
              if (meeting) {
                applyServerMeeting(meeting);
              }
            })
            .catch(() => {
              meetingState.preparationNoteKey = "app.meeting.flow.idle.candidate_body_meeting_failed";
            })
            .finally(() => {
              meetingState.loading = false;
              updateMeetingUI();
            });
          return;
        }
        startMeetingNavigation();
        return;
      }

      if (meetingFlowState === "navigating") {
        if (meetingState.serverMeeting && fullyAccepted && !youArrived && meetingState.currentPosition) {
          meetingState.loading = true;
          updateMeetingUI();
          checkInSharedMeeting(meetingState.serverMeeting.id, meetingState.currentPosition.lat, meetingState.currentPosition.lng)
            .then((meeting) => {
              if (meeting) {
                applyServerMeeting(meeting);
              }
            })
            .catch(() => {
              meetingState.preparationNoteKey = "app.meeting.flow.idle.candidate_body_meeting_failed";
            })
            .finally(() => {
              meetingState.loading = false;
              updateMeetingUI();
            });
          return;
        }
        refreshMeetingLocation();
        return;
      }

      if (meetingFlowState === "arrived") {
        if (meetingState.serverMeeting?.chat_unlocked) {
          openMeetingChat();
          return;
        }
        if (meetingState.serverMeeting && bothArrived && !youOk) {
          meetingState.loading = true;
          updateMeetingUI();
          confirmSharedMeetingOk(meetingState.serverMeeting.id)
            .then((meeting) => {
              if (meeting) {
                applyServerMeeting(meeting);
              }
            })
            .catch(() => {
              meetingState.preparationNoteKey = "app.meeting.flow.idle.candidate_body_meeting_failed";
            })
            .finally(() => {
              meetingState.loading = false;
              updateMeetingUI();
            });
          return;
        }
        if (meetingState.serverMeeting && bothArrived) {
          refreshMeetingLocation();
          return;
        }
        meetingState.meetingPoint = null;
        meetingState.route = null;
        meetingState.routeError = false;
        meetingState.routingStatus = "idle";
        meetingFlowState = "idle";
        requestMeetingSetup();
      }
    });

    window.addEventListener("beforeunload", () => {
      stopMatchingLiveRefresh();
      stopChatLiveRefresh();
    });

    window.addEventListener("online", () => {
      flushQueuedChatMessages();
    });

    document.getElementById("chatBackButton")?.addEventListener("click", () => {
      activateScreen("app");
      setTab("treffen");
    });

    document.getElementById("chatScreenInput")?.addEventListener("input", () => {
      updateMeetingUI();
    });

    document.getElementById("chatScreenThread")?.addEventListener("click", async (event) => {
      const retryButton = event.target.closest("[data-chat-retry]");
      if (!retryButton) return;
      await sendExistingChatMessage(retryButton.dataset.chatRetry);
    });

    document.getElementById("chatScreenSendButton")?.addEventListener("click", async () => {
      const input = document.getElementById("chatScreenInput");
      const text = input?.value?.trim?.();
      if (!text || !meetingState.serverMeeting?.id || !meetingState.serverMeeting?.chat_unlocked) return;

      const localMessage = createLocalChatMessage(text);
      meetingState.chatMessages = mergeChatMessages([localMessage]);
      meetingState.chatLoading = true;
      meetingState.chatError = "";
      if (input) input.value = "";
      updateMeetingUI();
      try {
        const message = await sendSharedChatMessage(meetingState.serverMeeting.id, text);
        if (message) {
          replaceLocalChatMessage(localMessage.local_id, message);
          meetingState.chatMessages = mergeChatMessages([]);
          meetingState.lastChatSyncAt = new Date().toISOString();
        } else {
          updateLocalChatMessageStatus(localMessage.local_id, "failed");
          meetingState.chatError = t("app.meeting.chat.error");
        }
      } catch (error) {
        if (isChatNetworkFailure(error)) {
          updateLocalChatMessageStatus(localMessage.local_id, "queued");
          meetingState.chatError = "";
        } else {
          updateLocalChatMessageStatus(localMessage.local_id, "failed");
          meetingState.chatError = error.message;
        }
      } finally {
        meetingState.chatLoading = false;
        updateMeetingUI();
      }
    });

    window.CYPMatching = {
      buildProfile: buildMatchingProfile,
      serializeProfile: serializeMatchingProfile,
      syncProfile: syncMatchingProfile,
      canUsersMatch,
      isWithinMatchingRadius,
      get profile() {
        return matchingState.profile ?? buildMatchingProfile();
      }
    };

    if (isDemoMode) {
      const backendOrigin = `${window.location.protocol}//${window.location.hostname}:8000`;
      const backendUrlEl = document.getElementById("backendUrl");
      const routeEl = document.getElementById("modeRoute");
      const capabilityStatusEl = document.getElementById("capabilityStatus");
      const capabilityListEl = document.getElementById("capabilityList");

      if (backendUrlEl) backendUrlEl.textContent = backendOrigin;
      if (routeEl) routeEl.textContent = `${window.location.pathname}${window.location.search || ""}`;

      fetch(`${backendOrigin}/capabilities`)
        .then((response) => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.json();
        })
        .then((data) => {
          const items = Array.isArray(data?.capabilities)
            ? data.capabilities
            : Array.isArray(data?.modules)
              ? data.modules
              : Array.isArray(data)
                ? data
                : [];

          capabilityStatusEl.textContent = items.length ? t("debug.state.live") : t("debug.state.empty");
          capabilityListEl.innerHTML = items.length
            ? items.map((item) => `<li><code>${String(item)}</code></li>`).join("")
            : `<li>${t("debug.state.none")}</li>`;
        })
        .catch(() => {
          capabilityStatusEl.textContent = t("debug.state.down");
          capabilityListEl.innerHTML = `<li>${t("debug.state.serverDown")}</li>`;
        });
    }
  </script>
</body>
</html>
