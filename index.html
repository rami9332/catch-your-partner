<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catch Your Partner</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    window.__CYP_RUNTIME_CONFIG__ = window.__CYP_RUNTIME_CONFIG__ || {};
  </script>
  <script src="./app-config.js"></script>
  <style>
    :root {
      --bg: #090909;
      --bg-soft: #121212;
      --surface: rgba(21, 21, 21, 0.9);
      --surface-2: rgba(27, 27, 27, 0.92);
      --surface-3: rgba(35, 35, 35, 0.88);
      --card-bg: linear-gradient(180deg, rgba(28, 28, 28, 0.96), rgba(21, 21, 21, 0.94));
      --card-subtle-bg: rgba(255, 255, 255, 0.04);
      --card-border: rgba(255, 209, 102, 0.06);
      --card-border-strong: rgba(255, 209, 102, 0.08);
      --card-shadow-soft: 0 16px 34px rgba(0, 0, 0, 0.18);
      --line: rgba(255, 209, 102, 0.1);
      --text: #f7f1e6;
      --muted: #b5a690;
      --gold: #ffd166;
      --amber: #ffb84d;
      --amber-2: #f49a2f;
      --olive: #ccd885;
      --success: #d8f29f;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      color: var(--text);
      font-family: "Manrope", system-ui, sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(255, 209, 102, 0.18), transparent 28%),
        radial-gradient(circle at 100% 10%, rgba(244, 154, 47, 0.18), transparent 24%),
        linear-gradient(180deg, #080808 0%, #0f0f0f 42%, #131313 100%);
      overflow-x: hidden;
    }

    body.app-mode .debug-only { display: none !important; }
    body.demo-mode .app-only { display: none !important; }

    .app-shell {
      width: min(100%, 430px);
      min-height: 100vh;
      margin: 0 auto;
      padding: max(14px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom));
      position: relative;
    }

    .screen {
      min-height: calc(100vh - max(18px, env(safe-area-inset-bottom)) - max(14px, env(safe-area-inset-top)));
      display: none;
      position: relative;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
    }

    .welcome-screen {
      align-items: stretch;
      padding: 10px 0 0;
    }

    .welcome-frame,
    .explain-frame,
    .auth-frame,
    .main-frame,
    .debug-frame {
      width: 100%;
      background: linear-gradient(180deg, rgba(18, 18, 18, 0.94), rgba(15, 15, 15, 0.92));
      border: 1px solid rgba(255, 209, 102, 0.08);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .welcome-frame {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 26px 20px 22px;
      position: relative;
    }

    .welcome-frame::before,
    .welcome-frame::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(16px);
      opacity: 0.9;
      pointer-events: none;
    }

    .welcome-frame::before {
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(255, 209, 102, 0.28), transparent 70%);
      top: -40px;
      right: -70px;
      animation: drift 8s ease-in-out infinite;
    }

    .welcome-frame::after {
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(244, 154, 47, 0.22), transparent 70%);
      left: -70px;
      bottom: 80px;
      animation: driftReverse 10s ease-in-out infinite;
    }

    .welcome-hero {
      display: grid;
      align-content: center;
      gap: 18px;
      min-height: 66vh;
      position: relative;
      z-index: 1;
    }

    .welcome-mark {
      width: 108px;
      height: 108px;
      border-radius: 34px;
      display: grid;
      place-items: center;
      font-family: "Space Grotesk", sans-serif;
      font-size: 50px;
      font-weight: 700;
      color: #1a1307;
      background: linear-gradient(145deg, var(--gold), var(--amber-2));
      box-shadow:
        0 0 0 1px rgba(255, 209, 102, 0.18),
        0 0 50px rgba(255, 209, 102, 0.2);
      animation: glow 2.8s ease-in-out infinite;
    }

    .overline {
      margin: 0;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 209, 102, 0.8);
      font-weight: 800;
    }

    h1, h2, h3, h4 {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      letter-spacing: -0.04em;
    }

    .welcome-title {
      font-size: clamp(38px, 11vw, 58px);
      line-height: 0.95;
      max-width: 8ch;
    }

    .welcome-subline {
      margin: 0;
      font-size: 17px;
      line-height: 1.45;
      color: var(--muted);
      max-width: 22ch;
    }

    .welcome-actions,
    .auth-actions,
    .stack-actions {
      display: grid;
      gap: 12px;
    }

    .skip-button {
      border: none;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 8px 0;
      justify-self: center;
      cursor: pointer;
      opacity: 0.9;
    }

    .button {
      width: 100%;
      min-height: 56px;
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 15px 18px;
      font: inherit;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, opacity 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .button:hover { transform: translateY(-1px); }

    .button-primary {
      color: #181108;
      background: linear-gradient(135deg, var(--gold), var(--amber-2));
      box-shadow: 0 16px 34px rgba(244, 154, 47, 0.24);
    }

    .button-secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 209, 102, 0.09);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .button-ghost {
      color: var(--muted);
      background: rgba(255, 255, 255, 0.025);
      border-color: rgba(255, 255, 255, 0.05);
      min-height: 48px;
      padding: 13px 18px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: none;
      opacity: 0.92;
    }

    .explain-screen,
    .auth-screen,
    .main-screen,
    .debug-screen {
      align-items: stretch;
      padding: 10px 0 0;
    }

    .explain-frame,
    .auth-frame,
    .main-frame,
    .debug-frame {
      padding: 22px 18px 20px;
      display: grid;
      gap: 18px;
    }

    .main-frame {
      max-width: 430px;
      margin: 0 auto;
      min-width: 0;
    }

    .screen-head {
      display: grid;
      gap: 8px;
    }

    .screen-head p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .step-list {
      display: grid;
      gap: 12px;
    }

    .flow-sequence {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .flow-step {
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 20px;
      background: var(--card-subtle-bg);
      border: 1px solid rgba(255, 209, 102, 0.05);
      color: #8f806d;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .flow-step-index {
      width: 36px;
      height: 36px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.04);
      color: #9d8e78;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .flow-step-label {
      font-size: 14px;
      font-weight: 700;
      color: inherit;
    }

    .flow-step.is-active {
      background: linear-gradient(135deg, rgba(255, 209, 102, 0.16), rgba(244, 154, 47, 0.12));
      border-color: rgba(255, 209, 102, 0.14);
      color: var(--text);
      transform: translateY(-1px);
    }

    .flow-step.is-active .flow-step-index {
      background: linear-gradient(135deg, var(--gold), var(--amber-2));
      color: #181108;
      box-shadow: 0 10px 24px rgba(244, 154, 47, 0.18);
    }

    .flow-step.is-done {
      background: rgba(216, 242, 159, 0.08);
      border-color: rgba(216, 242, 159, 0.12);
      color: #dff4a8;
    }

    .flow-step.is-done .flow-step-index {
      background: rgba(216, 242, 159, 0.16);
      color: #dff4a8;
    }

    .meeting-route-card {
      display: none;
      padding: 14px;
      border-radius: 24px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      box-shadow: var(--card-shadow-soft);
      margin-bottom: 12px;
      gap: 10px;
    }

    .meeting-route-card.is-visible {
      display: grid;
    }

    .map-stage {
      display: none;
      min-height: 250px;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--card-border);
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 209, 102, 0.08), transparent 36%),
        linear-gradient(180deg, rgba(25, 25, 25, 0.98), rgba(18, 18, 18, 0.96));
      box-shadow: var(--card-shadow-soft);
      position: relative;
    }

    .map-stage.is-visible {
      display: block;
    }

    .meeting-map {
      width: 100%;
      min-height: 250px;
    }

    .map-empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      z-index: 1;
      pointer-events: none;
    }

    .meeting-status-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .meeting-route-top {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .meeting-route-top > div:first-child {
      min-width: 0;
    }

    .meeting-route-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
    }

    .meeting-route-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .meeting-route-chip {
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 209, 102, 0.1);
      color: var(--gold);
      font-size: 12px;
      font-weight: 800;
      white-space: normal;
    }

    .meeting-route-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .meeting-flow-highlight {
      display: none;
      padding: 16px;
      border-radius: 24px;
      margin-bottom: 18px;
      background: linear-gradient(135deg, rgba(255, 209, 102, 0.18), rgba(244, 154, 47, 0.12));
      border: 1px solid rgba(255, 209, 102, 0.1);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .meeting-flow-highlight.is-visible {
      display: grid;
      gap: 8px;
    }

    .chat-card {
      display: none;
      gap: 12px;
      margin-top: 18px;
      padding: 16px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(32, 32, 32, 0.95), rgba(24, 24, 24, 0.92));
      border: 1px solid rgba(255, 209, 102, 0.08);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
    }

    .chat-card.is-visible {
      display: grid;
    }

    .chat-list {
      display: grid;
      gap: 10px;
      max-height: 240px;
      overflow-y: auto;
    }

    .chat-item {
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 209, 102, 0.06);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    .chat-item.is-mine {
      background: linear-gradient(135deg, rgba(255, 209, 102, 0.16), rgba(244, 154, 47, 0.12));
      border-color: rgba(255, 209, 102, 0.12);
    }

    .chat-screen {
      display: none;
      min-height: 100dvh;
      padding: 20px 18px calc(34px + env(safe-area-inset-bottom));
    }

    .chat-screen.active {
      display: block;
    }

    .chat-frame {
      display: grid;
      gap: 16px;
      width: min(100%, 430px);
      margin: 0 auto;
    }

    .chat-screen-head {
      display: grid;
      gap: 10px;
    }

    .chat-screen-head h2 {
      font-size: 28px;
      margin: 0;
    }

    .chat-screen-head p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .chat-thread {
      display: grid;
      gap: 12px;
      min-height: 340px;
      max-height: calc(100dvh - 320px);
      overflow-y: auto;
      padding-right: 2px;
    }

    .chat-bubble {
      display: grid;
      gap: 6px;
      padding: 14px 15px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 209, 102, 0.06);
    }

    .chat-bubble.is-mine {
      background: linear-gradient(135deg, rgba(255, 209, 102, 0.16), rgba(244, 154, 47, 0.12));
      border-color: rgba(255, 209, 102, 0.12);
    }

    .chat-bubble.is-failed {
      border-color: rgba(255, 120, 120, 0.26);
      box-shadow: inset 0 0 0 1px rgba(255, 120, 120, 0.08);
    }

    .chat-bubble-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      color: #d8c8b4;
      font-size: 12px;
      line-height: 1.3;
    }

    .chat-bubble-time {
      color: #9f8e79;
      white-space: nowrap;
    }

    .chat-bubble-status {
      color: #9f8e79;
      font-size: 12px;
      line-height: 1.35;
    }

    .chat-bubble-status.is-failed {
      color: #f2a7a7;
    }

    .chat-bubble-retry {
      justify-self: start;
      margin-top: 2px;
      border: none;
      background: transparent;
      color: rgba(255, 209, 102, 0.88);
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      padding: 0;
      cursor: pointer;
    }

    .chat-bubble-retry:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .meeting-flow-highlight .mini-pill {
      justify-self: start;
    }

    #meetingFlowTitle {
      margin-bottom: 8px;
    }

    #meetingFlowBody {
      margin: 0;
    }

    #meetingFlowCta {
      margin-top: 2px;
    }

    .step-card {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 14px;
      align-items: start;
      padding: 16px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(32, 32, 32, 0.95), rgba(24, 24, 24, 0.92));
      border: 1px solid rgba(255, 209, 102, 0.06);
    }

    .step-icon {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      color: #181108;
      font-family: "Space Grotesk", sans-serif;
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(145deg, rgba(255, 209, 102, 0.94), rgba(244, 154, 47, 0.9));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }

    .step-card h3 {
      font-size: 20px;
      margin-bottom: 6px;
    }

    .step-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .explain-tagline {
      margin: 2px 0 0;
      color: var(--text);
      font-size: 17px;
      line-height: 1.5;
    }

    .auth-toggle {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 209, 102, 0.06);
    }

    .auth-toggle button {
      min-height: 46px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .auth-toggle button.active {
      background: linear-gradient(135deg, rgba(255, 209, 102, 0.18), rgba(244, 154, 47, 0.18));
      color: var(--text);
    }

    .fields {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      font-size: 13px;
      font-weight: 700;
      color: #d8c8b4;
    }

    .field input,
    .field select,
    .talk-box textarea {
      width: 100%;
      border-radius: 18px;
      border: 1px solid rgba(255, 209, 102, 0.08);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      padding: 14px 14px;
      font: inherit;
    }

    .field input::placeholder,
    .talk-box textarea::placeholder {
      color: #8f7f6a;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .benefit-pill,
    .mini-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 209, 102, 0.07);
      color: #e7dccb;
      font-size: 13px;
      white-space: normal;
    }

    .auth-note {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .main-top {
      display: grid;
      gap: 10px;
    }

    .main-screen {
      padding-bottom: calc(96px + env(safe-area-inset-bottom));
    }

    .status-banner {
      padding: 12px 14px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(255, 209, 102, 0.18), rgba(244, 154, 47, 0.12));
      border: 1px solid rgba(255, 209, 102, 0.08);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .status-banner h2 {
      font-size: 24px;
      margin-bottom: 4px;
    }

    .status-banner p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .hero-actions-inline {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .hero-hint-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    @media (max-width: 560px) {
      .hero-hint-row {
        display: none;
      }
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(216, 242, 159, 0.12);
      color: var(--success);
      font-size: 13px;
      font-weight: 800;
    }

    .tab-content {
      display: none;
      gap: 16px;
    }

    .tab-content.active {
      display: grid;
    }

    .tab-content.is-profile-camera > .app-card:not(:first-child),
    .tab-content.is-profile-result > .app-card:not(:first-child) {
      display: none;
    }

    .tab-content.is-profile-normal .camera-frame,
    .tab-content.is-profile-normal #profileCapturePreview,
    .tab-content.is-profile-normal .camera-facts,
    .tab-content.is-profile-normal .camera-meta {
      display: none !important;
    }

    .tab-content.is-profile-result .camera-frame {
      display: none;
    }

    .tab-content.is-profile-camera #profileCapturePreview,
    .tab-content.is-profile-normal #profileCapturePreview,
    .tab-content.is-profile-result #profileCapturePreview {
      display: none !important;
    }

    .tab-content.is-profile-result .camera-facts,
    .tab-content.is-profile-result .camera-meta {
      display: none !important;
    }

    .tab-intro {
      display: grid;
      gap: 8px;
      padding: 18px 16px;
      border-radius: 24px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      box-shadow: var(--card-shadow-soft);
      min-width: 0;
    }

    .tab-intro h3 {
      font-size: 24px;
    }

    .tab-intro p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .card-stack {
      display: grid;
      gap: 12px;
    }

    .app-card {
      padding: 18px 16px;
      border-radius: 24px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      box-shadow: var(--card-shadow-soft);
      min-width: 0;
    }

    .app-card h3 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .app-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .radar-stage {
      min-height: 240px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(255, 209, 102, 0.12), transparent 34%),
        linear-gradient(180deg, rgba(32, 32, 32, 0.96), rgba(20, 20, 20, 0.94));
    }

    .radar-ring,
    .radar-core,
    .radar-ping {
      position: absolute;
      border-radius: 50%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .radar-ring {
      border: 1px dashed rgba(255, 209, 102, 0.12);
    }

    .radar-ring.r1 { width: 108px; height: 108px; }
    .radar-ring.r2 { width: 170px; height: 170px; }
    .radar-ring.r3 { width: 232px; height: 232px; }

    .radar-core {
      width: 18px;
      height: 18px;
      background: linear-gradient(135deg, var(--gold), var(--amber-2));
      box-shadow: 0 0 0 14px rgba(255, 209, 102, 0.08);
    }

    .radar-ping {
      width: 16px;
      height: 16px;
      background: #d4f39e;
      box-shadow: 0 0 0 10px rgba(212, 243, 158, 0.12);
    }

    .radar-ping.p1 { left: 34%; top: 43%; }
    .radar-ping.p2 { left: 66%; top: 60%; }
    .radar-ping.p3 { left: 56%; top: 28%; }

    .radar-legend {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 14px;
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .metric {
      padding: 14px;
      border-radius: 20px;
      background: var(--card-subtle-bg);
      border: 1px solid rgba(255, 209, 102, 0.06);
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .metric strong {
      display: block;
      font-family: "Space Grotesk", sans-serif;
      font-size: 24px;
    }

    .camera-frame {
      position: relative;
      overflow: hidden;
      min-height: 260px;
      border-radius: 24px;
      border: 1px solid var(--card-border);
      background:
        radial-gradient(circle at 50% 12%, rgba(255, 209, 102, 0.08), transparent 38%),
        linear-gradient(180deg, rgba(24, 24, 24, 0.98), rgba(16, 16, 16, 0.96));
      box-shadow: var(--card-shadow-soft);
    }

    .camera-video,
    .camera-capture {
      width: 100%;
      height: 100%;
      min-height: 260px;
      display: block;
      object-fit: cover;
      background: #0f0f0f;
    }

    .camera-capture {
      display: none;
      border-top: 1px solid rgba(255, 209, 102, 0.06);
      min-height: 180px;
    }

    .camera-capture.is-visible {
      display: block;
    }

    .camera-placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      z-index: 1;
      pointer-events: none;
    }

    .camera-placeholder.is-hidden {
      display: none;
    }

    .camera-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .camera-facts {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .matching-status {
      display: grid;
      gap: 12px;
      margin-top: 16px;
      padding: 14px;
      border-radius: 20px;
      background: var(--card-subtle-bg);
      border: 1px solid rgba(255, 209, 102, 0.06);
    }

    .matching-status h4 {
      font-size: 18px;
    }

    .matching-status p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .trust-panel {
      display: grid;
      gap: 14px;
    }

    .trust-levels {
      display: grid;
      gap: 10px;
    }

    .trust-level {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      border-radius: 18px;
      background: var(--card-subtle-bg);
      border: 1px solid rgba(255, 209, 102, 0.06);
    }

    .trust-level-copy {
      display: grid;
      gap: 4px;
    }

    .trust-level-title {
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
    }

    .trust-level-body {
      font-size: 13px;
      line-height: 1.45;
      color: var(--muted);
    }

    .trust-signal-list {
      display: grid;
      gap: 10px;
    }

    .trust-signal {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 209, 102, 0.05);
    }

    .trust-signal-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .trust-signal-note {
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
      color: var(--muted);
    }

    .safety-note {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-radius: 20px;
      background: var(--card-subtle-bg);
      border: 1px solid rgba(255, 209, 102, 0.06);
    }

    .safety-note h4 {
      font-size: 18px;
    }

    .safety-note p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .trust-phone-flow {
      display: grid;
      gap: 12px;
      padding: 14px;
      border-radius: 20px;
      background: var(--card-subtle-bg);
      border: 1px solid rgba(255, 209, 102, 0.06);
    }

    .trust-upload-flow {
      display: grid;
      gap: 12px;
      padding: 14px;
      border-radius: 20px;
      background: var(--card-subtle-bg);
      border: 1px solid rgba(255, 209, 102, 0.06);
    }

    .trust-phone-status {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .trust-phone-preview {
      margin: 0;
      color: rgba(255, 209, 102, 0.9);
      font-size: 13px;
      line-height: 1.45;
    }

    .trust-phone-flow.is-verified #profilePhoneCodeField,
    .trust-phone-flow.is-verified #profilePhoneVerifyButton,
    .trust-phone-flow.is-not-started #profilePhoneCodeField,
    .trust-phone-flow.is-not-started #profilePhoneVerifyButton {
      display: none;
    }

    .bullet-list {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .radar-status-card {
      display: grid;
      gap: 8px;
      margin-top: 16px;
      padding: 14px;
      border-radius: 20px;
      background: var(--card-subtle-bg);
      border: 1px solid rgba(255, 209, 102, 0.06);
    }

    .radar-status-card .mini-pill {
      justify-self: start;
    }

    .radar-status-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
    }

    .radar-status-body {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .bullet {
      display: grid;
      grid-template-columns: 30px 1fr;
      gap: 10px;
      align-items: start;
      color: var(--muted);
      font-size: 14px;
    }

    .bullet-mark {
      width: 30px;
      height: 30px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: rgba(255, 209, 102, 0.1);
      color: var(--gold);
      font-weight: 800;
      font-size: 13px;
    }

    .talk-box textarea {
      min-height: 120px;
      resize: vertical;
    }

    .coming-grid {
      display: grid;
      gap: 14px;
      margin-top: 8px;
    }

    .section-label {
      margin: 0 0 8px;
      color: rgba(255, 209, 102, 0.84);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .section-intro {
      margin: -2px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .more-section {
      display: grid;
      gap: 16px;
    }

    .more-section + .more-section {
      margin-top: 14px;
    }

    .bottom-nav {
      position: sticky;
      bottom: max(10px, env(safe-area-inset-bottom));
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 8px;
      border-radius: 26px;
      background: rgba(18, 18, 18, 0.92);
      border: 1px solid rgba(255, 209, 102, 0.08);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.36);
      backdrop-filter: blur(16px);
      z-index: 20;
    }

    .nav-button {
      border: none;
      border-radius: 18px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      padding: 10px 6px;
      display: grid;
      gap: 4px;
      justify-items: center;
      cursor: pointer;
      min-width: 0;
    }

    .nav-button.active {
      color: var(--text);
      background: linear-gradient(135deg, rgba(255, 209, 102, 0.16), rgba(244, 154, 47, 0.14));
    }

    .nav-icon {
      font-size: 18px;
      line-height: 1;
    }

    .debug-frame {
      background: linear-gradient(180deg, rgba(22, 18, 12, 0.96), rgba(18, 15, 11, 0.95));
    }

    .debug-grid {
      display: grid;
      gap: 12px;
    }

    .debug-card {
      padding: 16px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 209, 102, 0.06);
    }

    .debug-card h3 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .debug-card strong,
    .debug-card code,
    .debug-card li {
      word-break: break-word;
    }

    .debug-card p,
    .debug-card li {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .debug-card ul {
      margin: 10px 0 0;
      padding-left: 18px;
      display: grid;
      gap: 6px;
    }

    .footer-note {
      padding-top: 4px;
      color: rgba(181, 166, 144, 0.8);
      text-align: center;
      font-size: 12px;
    }

    @keyframes glow {
      0% { transform: translateY(0) scale(1); box-shadow: 0 0 0 1px rgba(255, 209, 102, 0.18), 0 0 40px rgba(255, 209, 102, 0.14); }
      50% { transform: translateY(-4px) scale(1.02); box-shadow: 0 0 0 1px rgba(255, 209, 102, 0.22), 0 0 68px rgba(255, 209, 102, 0.24); }
      100% { transform: translateY(0) scale(1); box-shadow: 0 0 0 1px rgba(255, 209, 102, 0.18), 0 0 40px rgba(255, 209, 102, 0.14); }
    }

    @keyframes drift {
      0% { transform: translate3d(0, 0, 0); }
      50% { transform: translate3d(-12px, 14px, 0); }
      100% { transform: translate3d(0, 0, 0); }
    }

    @keyframes driftReverse {
      0% { transform: translate3d(0, 0, 0); }
      50% { transform: translate3d(16px, -12px, 0); }
      100% { transform: translate3d(0, 0, 0); }
    }

    @media (min-width: 900px) {
      .app-shell {
        width: min(100%, 1040px);
      }

      body.app-mode .welcome-screen,
      body.app-mode .explain-screen,
      body.app-mode .auth-screen {
        justify-content: center;
      }

      body.app-mode .welcome-frame,
      body.app-mode .explain-frame,
      body.app-mode .auth-frame {
        max-width: 460px;
        margin: 0 auto;
      }

      body.app-mode .main-frame {
        max-width: 430px;
        margin: 0 auto;
      }

      body.demo-mode .debug-frame {
        max-width: 1040px;
        margin: 0 auto;
      }

      body.demo-mode .debug-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="screen welcome-screen app-only active" data-screen="welcome">
      <div class="welcome-frame">
        <div class="welcome-hero">
          <div class="welcome-mark">C</div>
          <div class="screen-head">
            <p class="overline" data-i18n="welcome.kicker"></p>
            <h1 class="welcome-title" data-i18n="welcome.title"></h1>
            <p class="welcome-subline" data-i18n="welcome.subline"></p>
          </div>
        </div>
        <div class="welcome-actions">
          <button class="button button-primary" type="button" data-action="go-screen" data-target-screen="explain" data-i18n="common.continue"></button>
          <button class="skip-button" type="button" data-action="go-screen" data-target-screen="auth" data-i18n="common.skip"></button>
        </div>
      </div>
    </section>

    <section class="screen explain-screen app-only" data-screen="explain">
      <div class="explain-frame">
        <div class="screen-head">
          <p class="overline" data-i18n="explain.kicker"></p>
          <h2 data-i18n="explain.title"></h2>
        </div>
        <div class="step-list">
          <article class="step-card">
            <div class="step-icon" data-i18n="explain.steps.radar.icon"></div>
            <div>
              <h3 data-i18n="explain.steps.radar.title"></h3>
              <p data-i18n="explain.steps.radar.body"></p>
            </div>
          </article>
          <article class="step-card">
            <div class="step-icon" data-i18n="explain.steps.meet.icon"></div>
            <div>
              <h3 data-i18n="explain.steps.meet.title"></h3>
              <p data-i18n="explain.steps.meet.body"></p>
            </div>
          </article>
          <article class="step-card">
            <div class="step-icon" data-i18n="explain.steps.chat.icon"></div>
            <div>
              <h3 data-i18n="explain.steps.chat.title"></h3>
              <p data-i18n="explain.steps.chat.body"></p>
            </div>
          </article>
        </div>
        <p class="explain-tagline" data-i18n="explain.tagline"></p>
        <div class="stack-actions">
          <button class="button button-primary" type="button" data-action="go-screen" data-target-screen="auth" data-i18n="common.continue"></button>
          <button class="button button-ghost" type="button" data-action="go-screen" data-target-screen="welcome" data-i18n="common.back"></button>
        </div>
      </div>
    </section>

    <section class="screen auth-screen app-only" data-screen="auth">
      <div class="auth-frame">
        <div class="screen-head">
          <p class="overline" data-i18n="auth.kicker"></p>
          <h2 data-i18n="auth.title"></h2>
          <p data-i18n="auth.subline"></p>
        </div>
        <div class="auth-toggle" role="tablist" aria-label="Authentifizierung">
          <button class="active" type="button" data-auth-mode="login" data-i18n="auth.tabs.login"></button>
          <button type="button" data-auth-mode="register" data-i18n="auth.tabs.register"></button>
        </div>
        <div class="pill-row">
          <span class="benefit-pill" data-i18n="auth.benefits.safety"></span>
          <span class="benefit-pill" data-i18n="auth.benefits.face"></span>
          <span class="benefit-pill" data-i18n="auth.benefits.premium"></span>
          <span class="benefit-pill" data-i18n="auth.benefits.buddy"></span>
        </div>
        <div class="fields" id="authFields"></div>
        <div class="auth-actions">
          <button class="button button-primary" type="button" id="authSubmit" data-i18n="auth.actions.login"></button>
          <button class="button button-secondary" type="button" data-action="go-screen" data-target-screen="explain" data-i18n="common.back"></button>
        </div>
        <p class="auth-note" id="authStatusNote" data-i18n="auth.note"></p>
      </div>
    </section>

    <section class="screen main-screen app-only" data-screen="app">
      <div class="main-frame">
        <div class="main-top">
          <div class="status-banner">
            <p class="overline" data-i18n="app.banner.kicker"></p>
            <h2 id="tabBannerTitle" data-i18n="app.banner.title"></h2>
            <p id="tabBannerBody" data-i18n="app.banner.body"></p>
            <div class="status-chip" id="tabBannerStatus" data-i18n="app.banner.status"></div>
            <div class="hero-actions-inline">
              <button class="button button-primary" type="button" id="tabBannerPrimary" data-tab-target="radar" data-i18n="app.banner.actions.primary"></button>
              <button class="button button-ghost" type="button" id="tabBannerSecondary" data-tab-target="treffen" data-i18n="app.banner.actions.secondary"></button>
            </div>
            <div class="hero-hint-row">
              <span class="mini-pill" id="tabBannerPill1" data-i18n="app.banner.pills.1"></span>
              <span class="mini-pill" id="tabBannerPill2" data-i18n="app.banner.pills.2"></span>
              <span class="mini-pill" id="tabBannerPill3" data-i18n="app.banner.pills.3"></span>
            </div>
          </div>
        </div>

        <section class="tab-content active" data-tab-content="radar">
          <article class="app-card radar-stage">
            <div class="radar-ring r1"></div>
            <div class="radar-ring r2"></div>
            <div class="radar-ring r3"></div>
            <div class="radar-core"></div>
            <div class="radar-ping p1"></div>
            <div class="radar-ping p2"></div>
            <div class="radar-ping p3"></div>
            <div class="radar-legend">
              <span data-i18n="app.radar.legend.1"></span>
              <span data-i18n="app.radar.legend.2"></span>
            </div>
          </article>
          <article class="app-card" id="profileScanCard">
            <div class="radar-status-card">
              <span class="mini-pill" id="radarStatusChip"></span>
              <div class="radar-status-title" id="radarStatusTitle"></div>
              <p class="radar-status-body" id="radarStatusBody"></p>
            </div>
            <div class="stack-actions" style="margin-top: 14px;">
              <button class="button button-primary" type="button" id="radarStartButton" data-i18n="app.radar.actions.start"></button>
              <button class="button button-secondary" type="button" id="radarStopButton" data-i18n="app.radar.actions.stop"></button>
            </div>
            <div class="bullet-list">
              <div class="bullet">
                <div class="bullet-mark">1</div>
                <div data-i18n="app.radar.points.status"></div>
              </div>
              <div class="bullet">
                <div class="bullet-mark">2</div>
                <div data-i18n="app.radar.points.safety"></div>
              </div>
              <div class="bullet">
                <div class="bullet-mark">3</div>
                <div data-i18n="app.radar.points.match"></div>
              </div>
            </div>
          </article>
        </section>

        <section class="tab-content" data-tab-content="treffen">
          <article class="app-card" id="profileDetailsCard">
            <div class="meeting-status-meta">
              <span class="mini-pill" id="meetingPermissionChip"></span>
              <span class="mini-pill" id="meetingRoutingChip"></span>
            </div>
            <h3 id="meetingFlowTitle"></h3>
            <p id="meetingFlowBody"></p>
            <div class="stack-actions" style="margin-top: 12px;">
              <button class="button button-primary" type="button" id="meetingFlowCta"></button>
            </div>
            <div class="flow-sequence" id="meetingFlowSequence"></div>
            <div class="meeting-route-card" id="meetingRouteCard">
              <div class="meeting-route-top">
                <div>
                  <div class="meeting-route-title" id="meetingRouteTitle"></div>
                  <p class="meeting-route-subtitle" id="meetingRouteSubtitle"></p>
                </div>
                <div class="meeting-route-chip" id="meetingRouteChip"></div>
              </div>
              <div class="meeting-route-meta">
                <span class="mini-pill" id="meetingRouteDistance"></span>
                <span class="mini-pill" id="meetingRouteEta"></span>
              </div>
            </div>
            <div class="map-stage" id="meetingMapStage">
              <div class="meeting-map" id="meetingMap"></div>
              <div class="map-empty" id="meetingMapEmpty" data-i18n="app.meeting.map.empty"></div>
            </div>
          </article>
          <article class="app-card">
            <div class="safety-note">
              <h4 data-i18n="app.meeting.safety.title"></h4>
              <div class="bullet-list" style="margin-top: 0;">
                <div class="bullet">
                  <div class="bullet-mark">1</div>
                  <div data-i18n="app.meeting.safety.public"></div>
                </div>
                <div class="bullet">
                  <div class="bullet-mark">2</div>
                  <div data-i18n="app.meeting.safety.private"></div>
                </div>
                <div class="bullet">
                  <div class="bullet-mark">3</div>
                  <div data-i18n="app.meeting.safety.exit"></div>
                </div>
              </div>
            </div>
          </article>
        </section>

        <section class="tab-content" data-tab-content="profil">
          <article class="app-card">
            <div class="camera-frame">
              <video class="camera-video" id="profileCameraVideo" autoplay muted playsinline></video>
              <div class="camera-placeholder" id="profileCameraPlaceholder" data-i18n="app.profile.camera.placeholder"></div>
            </div>
            <canvas id="profileCaptureCanvas" hidden></canvas>
            <img class="camera-capture" id="profileCapturePreview" alt="Scan-Vorschau">
            <div class="camera-meta">
              <span class="mini-pill" id="profileCameraChip"></span>
              <span class="mini-pill" id="profileScanChip"></span>
            </div>
            <h3 id="profileScanTitle"></h3>
            <p id="profileScanBody"></p>
            <div class="stack-actions" style="margin-top: 14px;">
              <button class="button button-primary" type="button" id="profileCameraButton"></button>
              <button class="button button-secondary" type="button" id="profileScanButton"></button>
            </div>
            <div class="camera-facts">
              <div class="bullet">
                <div class="bullet-mark">K</div>
                <div id="profileDetectionInfo"></div>
              </div>
              <div class="bullet">
                <div class="bullet-mark">S</div>
                <div id="profileStorageInfo"></div>
              </div>
              <div class="bullet">
                <div class="bullet-mark">V</div>
                <div id="profileVerificationInfo"></div>
              </div>
            </div>
          </article>
          <article class="app-card">
            <h3 data-i18n="app.profile.processing.title"></h3>
            <p data-i18n="app.profile.processing.body"></p>
            <div class="metric-grid">
              <div class="metric">
                <div class="metric-label" data-i18n="app.profile.metrics.mode.label"></div>

    ];

    const params = new URLSearchParams(window.location.search);
    const isDemoMode = params.get("debug") === "1" || window.location.pathname === "/admin" || window.location.pathname === "/admin/";
    document.body.classList.add(isDemoMode ? "demo-mode" : "app-mode");

    const lang = params.get("lang") === "en" ? "en" : "de";

    function t(key) {
      return i18n[lang][key] ?? i18n.de[key] ?? key;
    }

    function tFormat(key, values = {}) {
      return Object.entries(values).reduce((message, [name, value]) => {
        return message.replaceAll(`{${name}}`, String(value));
      }, t(key));
    }

    function applyI18n() {
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        node.textContent = t(node.dataset.i18n);
      });

      document.querySelectorAll("[data-i18n-placeholder]").forEach((node) => {
        node.setAttribute("placeholder", t(node.dataset.i18nPlaceholder));
      });
    }

    function renderAuthFields(mode) {
      const container = document.getElementById("authFields");
      container.innerHTML = "";

      authFieldDefs[mode].forEach((fieldDef) => {
        const field = document.createElement("div");
        field.className = "field";

        const label = document.createElement("label");
        label.textContent = t(fieldDef.label);
        label.htmlFor = `auth-${mode}-${fieldDef.name}`;
        field.appendChild(label);

        if (fieldDef.type === "select") {
          const select = document.createElement("select");
          select.id = `auth-${mode}-${fieldDef.name}`;
          fieldDef.options.forEach((optionDef) => {
            const option = document.createElement("option");
            option.value = optionDef.value;
            option.textContent = t(optionDef.label);
            select.appendChild(option);
          });
          field.appendChild(select);
        } else {
          const input = document.createElement("input");
          input.id = `auth-${mode}-${fieldDef.name}`;
          input.type = fieldDef.type;
          input.placeholder = t(fieldDef.placeholder);
          field.appendChild(input);
        }

        container.appendChild(field);
      });

      document.getElementById("authSubmit").textContent = t(`auth.actions.${mode}`);
    }

    function activateScreen(name) {
      document.querySelectorAll(".screen").forEach((screen) => {
        if (screen.classList.contains("debug-only")) return;
        screen.classList.toggle("active", screen.dataset.screen === name);
      });
      reconcileChatLiveRefresh();
    }

      if (authState.photoBusy) return;

        authState.photoErrorKey = "app.profile.photo.error.auth";
        updateProfileUI();
        return;
      }

      const input = document.getElementById("profilePhotoInput");
      const file = input?.files?.[0];
      if (!file) {
        authState.photoErrorKey = "app.profile.photo.error.missing";
        updateProfileUI();
        return;
      }

      authState.photoBusy = true;
      authState.photoErrorKey = "";
      authState.photoStatusKey = "app.profile.photo.status.uploading";
      updateProfileUI();

      try {
        const formData = new FormData();
        formData.append("upload", file);

        const response = await fetch(`${getBackendOrigin()}/auth/profile-photo`, {
          method: "POST",
          headers: {
            Authorization: `Bearer ${authState.token}`
          },
          body: formData
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          const detail = typeof data?.detail === "string" ? data.detail : "";
          if (detail === "Only image uploads are supported" || detail === "Unsupported image format") {
            throw new Error("app.profile.photo.error.invalid_type");
          }
          if (detail === "Profile photo is too large") {
            throw new Error("app.profile.photo.error.too_large");
          }
          if (detail === "Uploaded image is invalid" || detail === "Uploaded image is empty") {
            throw new Error("app.profile.photo.error.invalid");
          }
          if (detail === "Profile photo is too small") {
            throw new Error("app.profile.photo.error.too_small");
          }
          throw new Error("app.profile.photo.error.upload_failed");
        }

        authState.user = data || authState.user;
        authState.photoErrorKey = "";
        authState.photoStatusKey = "app.profile.photo.status.pending_review";
        persistAuthSession();
        if (input) input.value = "";
      } catch (error) {
        authState.photoStatusKey = "app.profile.photo.status.idle";
        authState.photoErrorKey = error instanceof TypeError ? "app.profile.photo.error.upload_failed" : (error.message || "app.profile.photo.error.upload_failed");
      } finally {
        authState.photoBusy = false;
        updateProfileUI();
      }
    }

    function clearSafetyAlarmCountdown() {
      if (authState.safetyAlarmCountdownTimer) {

        authState.safetyAlarmCountdownTimer = null;
      }
      authState.safetyAlarmCountdownUntil = 0;
    }

    function getSafetyAlarmCountdownSeconds() {
      if (!authState.safetyAlarmCountdownUntil) return 0;
      return Math.max(0, Math.ceil((authState.safetyAlarmCountdownUntil - Date.now()) / 1000));
    }

    function startSafetyAlarmCountdown() {
      clearSafetyAlarmCountdown();
      authState.safetyAlarmCountdownUntil = Date.now() + 5000;
      authState.safetyAlarmStatusKey = "app.profile.safety.alarm.countdown";
      updateProfileUI();
      authState.safetyAlarmCountdownTimer = window.setInterval(async () => {
        const seconds = getSafetyAlarmCountdownSeconds();
        if (seconds <= 0) {
          clearSafetyAlarmCountdown();
          await deliverSafetyAlarm();
          return;
        }
        updateProfileUI();
      }, 250);
    }

      }
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const existing = document.querySelector(`script[data-src="${src}"]`);
        if (existing) {
          if (existing.dataset.loaded === "true") {
            resolve();
            return;
          }
          existing.addEventListener("load", () => resolve(), { once: true });
          existing.addEventListener("error", () => reject(new Error(src)), { once: true });
          return;
        }

        const script = document.createElement("script");
        script.src = src;
        script.async = true;
        script.dataset.src = src;
        script.addEventListener("load", () => {
          script.dataset.loaded = "true";
          resolve();
        }, { once: true });
        script.addEventListener("error", () => reject(new Error(src)), { once: true });
        document.head.appendChild(script);
      });
    }

    function ensureStylesheet(href) {
      if (document.querySelector(`link[data-href="${href}"]`)) return;
      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = href;
      link.dataset.href = href;
      document.head.appendChild(link);
    }

    async function ensureLeaflet() {
      if (window.L) return window.L;
      ensureStylesheet("https://unpkg.com/leaflet@1.9.4/dist/leaflet.css");
      await loadScript("https://unpkg.com/leaflet@1.9.4/dist/leaflet.js");
      return window.L;
    }

    async function ensureFaceDetector() {
      if (profileState.detector) return profileState.detector;

      try {
        const vision = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/+esm");
        const filesetResolver = await vision.FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
        profileState.detector = await vision.FaceDetector.createFromOptions(filesetResolver, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/latest/blaze_face_short_range.tflite"
          },
          runningMode: "IMAGE",
          minDetectionConfidence: 0.5
        });
        profileState.mediaPipeLoaded = true;
        profileState.detectorMode = "detect";
        return profileState.detector;
      } catch (error) {
        profileState.detectorMode = "camera_only";
        throw error;
      }
    }

    function stopProfileCamera() {
      if (profileState.stream?.getTracks) {
        profileState.stream.getTracks().forEach((track) => track.stop());
      }
      profileState.stream = null;
      if (profileState.cameraState !== "error") profileState.cameraState = "idle";
      if (profileState.scanState === "active") profileState.scanState = "idle";
      const video = document.getElementById("profileCameraVideo");
      if (video) video.srcObject = null;
      updateProfileUI();
    }

    function handleNativeCameraScanResult(result) {
      if (!result || result.type !== "cameraScanResult") return;

      profileState.stream = null;
      profileState.lastFaceCount = Number.isFinite(result.faceCount) ? result.faceCount : 0;
      profileState.detectorMode = "detect";
      profileState.lastScanAt = new Date().toISOString();
      profileState.captureDataUrl = result.scanAvailable ? `native-scan:${profileState.lastScanAt}` : "";

      if (result.errorStatus === "no_face") {
        profileState.cameraState = "idle";
        profileState.scanState = "no_face";
        profileState.resultState = "no_face";
        profileState.lastErrorKey = "";
      } else if (result.errorStatus === "multiple_faces") {
        profileState.cameraState = "idle";
        profileState.scanState = "multiple_faces";
        profileState.resultState = "multiple_faces";
        profileState.lastErrorKey = "";
      } else if (result.errorStatus) {
        profileState.cameraState = "error";
        profileState.scanState = "error";
        profileState.resultState = "error";
        profileState.lastErrorKey = result.errorStatus === "camera_denied"
          ? "app.profile.errors.camera_permission"
          : result.errorStatus === "camera_unavailable"
            ? "app.profile.errors.camera_unavailable"
            : result.errorStatus === "camera_busy"
              ? "app.profile.errors.camera_busy"
              : result.errorStatus === "vision_failed"
                ? "app.profile.errors.detection_load"
                : "app.profile.errors.stream_failed";
      } else if (result.verificationReady && result.faceCount === 1) {
        profileState.cameraState = "idle";
        profileState.scanState = "success";
        profileState.resultState = "ready";
        profileState.lastErrorKey = "";
      } else {
        profileState.cameraState = "idle";
        profileState.scanState = "error";
        profileState.resultState = "error";
        profileState.lastErrorKey = "app.profile.scan.body.error";
      }

      if (result.errorStatus && !result.scanAvailable) {
        profileState.captureDataUrl = "";
      }
      if (result.errorStatus === "no_face") {
        profileState.captureDataUrl = "";
      }
      if (result.errorStatus === "multiple_faces") {
        profileState.captureDataUrl = "";
      }
      if (result.errorStatus) {
        profileState.stream = null;
      }
      if (!result.errorStatus && result.verificationReady && result.faceCount === 1) {
        profileState.captureDataUrl = profileState.captureDataUrl || `native-scan:${Date.now()}`;
        profileState.lastErrorKey = "";
      }

      updateProfileUI();
      scheduleMatchingSync("scan");
    }

    function supportsRealCameraAccess() {
      return Boolean(navigator.mediaDevices?.getUserMedia);
    }

    function cameraNeedsSecureContext() {
      return !window.isSecureContext && window.location.protocol !== "file:";
    }

    async function hasVideoInputDevice() {
      if (!navigator.mediaDevices?.enumerateDevices) return null;
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        return devices.some((device) => device.kind === "videoinput");
      } catch {
        return null;
      }
    }

    function mapCameraError(error) {
      if (cameraNeedsSecureContext()) return "app.profile.errors.camera_insecure";
      const name = error?.name || "";
      if (name === "NotAllowedError" || name === "SecurityError") return "app.profile.errors.camera_permission";
      if (name === "NotFoundError" || name === "OverconstrainedError") return "app.profile.errors.camera_unavailable";
      if (name === "NotReadableError" || name === "AbortError") return "app.profile.errors.camera_busy";
      return "app.profile.errors.stream_failed";
    }

    async function startProfileCamera() {
      if (window.CYPNative?.startCameraScan) {
        const started = window.CYPNative.startCameraScan();
        if (started) {
          profileState.cameraState = "requesting";
          profileState.scanState = "requesting";
          profileState.resultState = "none";
          profileState.captureDataUrl = "";
          profileState.lastErrorKey = "";
          updateProfileUI();
          return;
        }
      }

      if (!supportsRealCameraAccess()) {
        profileState.cameraState = "error";
        profileState.scanState = "error";
        profileState.lastErrorKey = cameraNeedsSecureContext()
          ? "app.profile.errors.camera_insecure"
          : "app.profile.errors.camera_unavailable";
        updateProfileUI();
        return;
      }

      try {
        profileState.cameraState = "requesting";
        profileState.scanState = "requesting";
        profileState.lastErrorKey = "";
        updateProfileUI();

        const hasVideoInput = await hasVideoInputDevice();
        if (hasVideoInput === false) {
          throw { name: "NotFoundError" };
        }

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        profileState.stream = stream;
        profileState.cameraState = "active";
        profileState.scanState = "active";
        const video = document.getElementById("profileCameraVideo");
        if (video) {
          video.srcObject = stream;
          await video.play().catch(() => {});
        }

        try {
          await ensureFaceDetector();
        } catch (error) {
          profileState.lastErrorKey = "app.profile.errors.detection_load";
          profileState.scanState = "unsupported";
        }
      } catch (error) {
        profileState.cameraState = "error";
        profileState.scanState = "error";
        profileState.lastErrorKey = mapCameraError(error);
      }

      updateProfileUI();
      scheduleMatchingSync("scan");
    }

    async function runProfileScan() {
      const video = document.getElementById("profileCameraVideo");
      const canvas = document.getElementById("profileCaptureCanvas");
      const preview = document.getElementById("profileCapturePreview");

      if (!profileState.stream || !video || !canvas || !preview) return;

      profileState.scanState = "processing";
      profileState.lastErrorKey = "";
      updateProfileUI();

      try {
        const detector = await ensureFaceDetector();
        if (!video.videoWidth || !video.videoHeight) {
          throw new Error("video-not-ready");
        }

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const context = canvas.getContext("2d");
        if (!context) throw new Error("canvas");
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        profileState.captureDataUrl = canvas.toDataURL("image/jpeg", 0.92);
        preview.src = profileState.captureDataUrl;
        preview.classList.add("is-visible");

        const result = detector ? await detector.detect(canvas) : null;
        const faces = Array.isArray(result?.detections) ? result.detections.length : 0;
        profileState.lastFaceCount = faces;
        profileState.lastScanAt = new Date().toISOString();

        if (faces === 1) {
          profileState.scanState = "success";
          profileState.resultState = "ready";
        } else if (faces > 1) {
          profileState.scanState = "multiple_faces";
          profileState.resultState = "multiple_faces";
        } else {
          profileState.scanState = "no_face";
          profileState.resultState = "no_face";
        }
      } catch (error) {
        profileState.scanState = profileState.detectorMode === "camera_only" ? "unsupported" : "error";
        profileState.resultState = "error";
        if (!profileState.lastErrorKey) {
          profileState.lastErrorKey = profileState.detectorMode === "camera_only"
            ? "app.profile.errors.detection_load"
            : "app.profile.errors.stream_failed";
        }
      } finally {
        if (profileState.stream) {
          profileState.stream.getTracks().forEach((track) => track.stop());
          profileState.stream = null;
        }
        if (video) {
          video.pause?.();
          video.srcObject = null;
        }
      }

      updateProfileUI();
    }

    function formatDistance(meters) {
      if (!Number.isFinite(meters)) return t("app.meeting.route.meta.distance_unknown");
      if (meters < 1000) return `${Math.round(meters)} m`;
      return `${(meters / 1000).toFixed(1).replace(".", ",")} km`;
    }

    function formatDuration(seconds) {
      if (!Number.isFinite(seconds)) return t("app.meeting.route.meta.duration_unknown");
      const minutes = Math.max(1, Math.round(seconds / 60));
      return `${minutes} Min`;
    }

    function distanceBetween(a, b) {
      const toRad = (value) => value * Math.PI / 180;
      const earth = 6371000;
      const dLat = toRad(b.lat - a.lat);
      const dLng = toRad(b.lng - a.lng);
      const lat1 = toRad(a.lat);
      const lat2 = toRad(b.lat);
      const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
      return 2 * earth * Math.asin(Math.sqrt(h));
    }

    function locationSnapshot() {
      if (!meetingState.currentPosition) return null;
      return {
        lat: meetingState.currentPosition.lat,
        lng: meetingState.currentPosition.lng,
        updatedAt: meetingState.lastLocationAt ?? new Date().toISOString()
      };
    }

    function currentUserMeetingLocation() {
      if (meetingState.currentPosition) {
        return {
          lat: meetingState.currentPosition.lat,
          lng: meetingState.currentPosition.lng,
          updatedAt: meetingState.lastLocationAt ?? new Date().toISOString()
        };
      }

      const profileLocation = matchingState.profile?.location;
      if (profileLocation?.lat != null && profileLocation?.lng != null) {
        return {
          lat: profileLocation.lat,
          lng: profileLocation.lng,
          updatedAt: profileLocation.updatedAt ?? profileLocation.updated_at ?? null
        };
      }

      return null;
    }

    function midpointBetween(a, b) {
      return {
        lat: (a.lat + b.lat) / 2,
        lng: (a.lng + b.lng) / 2
      };
    }

    function applyServerMeeting(meeting) {
      if (!meeting) return;
      meetingState.serverMeeting = meeting;
      meetingState.meetingPoint = {
        name: meeting.spot_name,
        lat: meeting.spot_lat,
        lng: meeting.spot_lng
      };
      if (!meetingState.currentPosition) {
        const localLocation = currentUserMeetingLocation();
        if (localLocation) {
          meetingState.currentPosition = {
            lat: localLocation.lat,
            lng: localLocation.lng
          };
          meetingState.lastLocationAt = localLocation.updatedAt ?? new Date().toISOString();
        }
      }
      meetingState.route = null;
      meetingState.routeError = false;
      meetingState.routingStatus = meeting.status === "navigating" ? "active" : meeting.status === "checked_in" ? "arrived" : "ready";
      meetingState.errorKey = "";
      meetingState.preparationNoteKey = "";
      if (!meeting.chat_unlocked) {
        meetingState.chatOpen = false;
        meetingState.chatMessages = [];
        meetingState.lastChatSyncAt = "";
        stopChatLiveRefresh();
      }
      meetingFlowState = meeting.status === "checked_in" ? "arrived" : "meeting_point_ready";
    }

        }
      });
